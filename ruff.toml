# Ruff configuration for Claudeville

# Match the lowest supported interpreter (environment.yaml: python>=3.9) so the
# UP autofixes never emit syntax that breaks on the support floor.
target-version = "py39"

[lint]
# Select rules to enable
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort (import ordering)
    "UP",  # pyupgrade (modernize syntax)
]
# NOTE: B (bugbear) and S (flake8-bandit) are a planned follow-up (OPS-6 cont.) —
# they surface ~17 violations that need per-site judgment (B007 unused loop vars,
# S110 try-except-pass, S605 shell), so they are sequenced separately.

# Ignore rules globally
ignore = [
    "E501",   # Line too long - enforced by ruff-format when possible
]

# Per-file ignores
[lint.per-file-ignores]
# Ignore E402 (module level import not at top of file) in files that need sys.path manipulation
"reverie/backend_server/persona/**/*.py" = ["E402"]
"reverie/backend_server/persona/prompt_template/*.py" = ["E402"]
"reverie/backend_server/persona/memory_structures/*.py" = ["E402"]
"reverie/backend_server/persona/cognitive_modules/*.py" = ["E402"]

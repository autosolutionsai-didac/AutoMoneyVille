name: claudeville
channels:
  - conda-forge
  - defaults

dependencies:
  # Core Python
  - python>=3.9,<3.12

  # Web frameworks
  # Note: django>=4.2 is installed via pip (dj-database-url dependency)
  # Django 4.2 is LTS and works with our updated code
  - django-cors-headers>=4.0.0
  - gunicorn>=20.1.0
  - flask>=2.0.0  # Backend HTTP server for frontend communication

  # Data science essentials
  - numpy>=1.25.0
  - pandas>=2.0.0
  - scipy>=1.11.0
  - scikit-learn>=1.3.0
  - matplotlib>=3.7.0
  - seaborn>=0.12.0

  # Map tooling (tools/mapgen): structural detection of tile-grid zones from the
  # town PNG — edges/contours for walls/footprints, color segmentation for rooms.
  - scikit-image>=0.22.0

  # NLP (no embeddings - Claude handles semantic understanding)
  - nltk>=3.6.5

  # Async support for parallel Claude CLI calls
  - aiohttp>=3.8.0

  # Browser automation
  - selenium>=4.8.0

  # Utilities
  - requests>=2.26.0
  - tqdm>=4.62.0
  - pillow>=8.4.0
  - regex>=2021.11.10
  - python-dateutil>=2.8.0

  # Database
  - psycopg2>=2.9.0

  # Pip dependencies (for packages not in conda)
  - pip

  - pip:
    # Pins below target reproducibility (OPS-5). NOTE: a full conda-lock for the
    # conda-resolved scientific stack is a follow-up (requires a conda host;
    # the dev venv on disk is a uv venv without pip, so no faithful freeze here).
    # Django (4.2 LTS — stay on the tested 4.2.x line)
    - django>=4.2,<4.3
    - dj-database-url>=0.5.0
    # Statistics
    - statsmodels>=0.13.0
    - scikit-posthocs>=0.7.0

    # Other utilities
    - trueskill>=0.4.5

    # Map tooling (tools/mapgen): OpenCV for the structural zone detector
    # (headless = no GUI deps; server-friendly)
    - opencv-python-headless>=4.9.0

    # Development tools (ruff pinned to match .pre-commit-config.yaml)
    - pre-commit>=3.6.0
    - ruff==0.15.17

    # Claude Agent SDK (fast-moving — pin to the tested 0.2.x line; a breaking
    # 0.3 could change ClaudeAgentOptions and silently break new installs)
    - claude-agent-sdk>=0.2.101,<0.3.0

# Note: The following have been intentionally REMOVED:
# - openai (replaced by Claude CLI)
# - sentence-transformers (embeddings replaced by Sonnet retrieval)
# - gensim (word embeddings not needed)
# - torch/transformers (no neural embedding models needed)

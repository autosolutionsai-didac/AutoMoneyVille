{% load static %}
<script>
// Agent Inspector (P1.C1): live simulations poll the backend; frozen replays
// read immutable run files once. Agent-authored text is always textContent.
(function () {
	const PROFILE_BASE = "{% static 'assets/characters/profile/' %}";
	const stateSource = ClaudevilleInspectorSource.create({
		mode: document.getElementById('sim_mode')?.textContent.trim() || 'simulate',
		liveUrlTemplate: "{% url 'api_persona_state' 'PERSONA_NAME' %}",
		replayUrlTemplate: "{% url 'api_replay_persona_state' sim_code requested_step|default:step 'PERSONA_NAME' %}",
	});
	const POLL_MS = 5000;

	let pollTimer = null;

	const el = (id) => document.getElementById(id);

	function rowDiv(className, text, title) {
		const div = document.createElement('div');
		div.className = className;
		div.textContent = text;
		if (title) div.title = title;
		return div;
	}

	function renderState(state, requestedName) {
		const scope = el('inspector-state-scope');
		if (scope) {
			scope.textContent = ClaudevilleInspectorSource.scopeSummary(state);
		}
		el('inspector-name').textContent = state.name || requestedName || '--';
		el('inspector-currently').textContent =
			ClaudevilleAddresses.translateText(state.currently || '');
		el('inspector-action').textContent =
			ClaudevilleAddresses.translateText(state.action || '--');
		el('inspector-address').textContent =
			ClaudevilleAddresses.displayAddress(state.address || '');
		const schedule = el('inspector-schedule');
		schedule.textContent = '';
		(state.schedule || []).forEach((item, i) => {
			const row = rowDiv(
				'inspector-row' + (i === state.schedule_current_index ? ' current' : ''),
				`${ClaudevilleAddresses.translateText(item.task)} (${item.minutes}m)`
			);
			schedule.appendChild(row);
		});
		if (!schedule.childNodes.length) {
			schedule.appendChild(rowDiv('inspector-row muted', 'No schedule yet today'));
		}

		const goals = el('inspector-goals');
		goals.textContent = '';
		(state.goals || []).forEach(goal => {
			const title = ClaudevilleAddresses.translateText(goal.title);
			const label = goal.status ? `${title} — ${goal.status}` : title;
			goals.appendChild(rowDiv('inspector-row', label));
		});
		if (!goals.childNodes.length) {
			goals.appendChild(rowDiv('inspector-row muted', 'No active goals'));
		}

		const rels = el('inspector-relationships');
		rels.textContent = '';
		(state.relationships || []).slice(0, 8).forEach(rel => {
			const topics = rel.last_topics && rel.last_topics.length
				? ` · ${rel.last_topics.join(', ')}` : '';
			rels.appendChild(rowDiv(
				'inspector-row',
				`${rel.name} — ${rel.sentiment || 'neutral'} (familiarity ${rel.familiarity})${topics}`
			));
		});
		if (!rels.childNodes.length) {
			rels.appendChild(rowDiv('inspector-row muted', 'No one met yet'));
		}

		const memories = el('inspector-memories');
		memories.textContent = '';
		(state.memories || []).forEach(memory => {
			const time = (memory.created || '').split(' ').pop() || '';
			memories.appendChild(rowDiv(
				`inspector-row memory-${memory.kind}`,
				`[${memory.kind}] ${ClaudevilleAddresses.translateText(memory.description)}`,
				time
			));
		});
		if (!memories.childNodes.length) {
			memories.appendChild(rowDiv('inspector-row muted', 'No memories yet'));
		}
	}

	const controller = ClaudevilleInspectorController.create({
		fetch: window.fetch.bind(window),
		source: stateSource,
		addresses: ClaudevilleAddresses,
		onState: renderState,
		onError: message => { el('inspector-currently').textContent = message; },
		onFocus: sector => {
			if (typeof window.setFocusedWorldSector === 'function') {
				window.setFocusedWorldSector(sector);
			}
		},
	});

	function openInspector(name) {
		window.ClaudevilleHUD?.inspectorOpened();
		el('inspector-drawer').classList.remove('hidden');
		el('inspector-name').textContent = name;
		el('inspector-portrait').src = ClaudevilleCharacters.portraitUrl(
			null, name, static_asset_root
		) || PROFILE_BASE + name.replace(/ /g, '_') + '.png';
		controller.open(name);
		if (pollTimer) clearInterval(pollTimer);
		if (stateSource.shouldPoll) {
			pollTimer = setInterval(controller.refresh, POLL_MS);
		}
	}

	function closeInspector() {
		controller.close();
		el('inspector-drawer').classList.add('hidden');
		if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
	}

	document.querySelectorAll('.persona-card').forEach(card => {
		card.addEventListener('click', () => {
			const name = card.getAttribute('data-persona-name');
			if (name) openInspector(name);
		});
	});
	el('inspector-close').addEventListener('click', closeInspector);
	el('inspector-follow').addEventListener('click', () => {
		const openPersona = controller.currentName();
		if (openPersona && typeof window.setCameraFollowTarget === 'function') {
			window.setCameraFollowTarget(openPersona);
		}
	});

	// Sprites open the inspector too, when the game layer offers clicks.
	window.openPersonaInspector = openInspector;
})();
</script>

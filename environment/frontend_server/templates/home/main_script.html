{% load static %}

<script type="text/javascript">
	// ###########################################################################
	// PREAMBLE
	// ###########################################################################
	// Hidden data divs are rendered ONCE by home.html (they used to be
	// duplicated here too — invalid HTML that worked by getElementById accident).

	let step = parseInt(document.getElementById('step').innerHTML);
	let sim_code = document.getElementById('sim_code').innerHTML;
	// 'simulate' (live backend) or 'replay' (recorded run, no live polling).
	const SIM_MODE = (document.getElementById('sim_mode')?.textContent || 'simulate').trim();
	const IS_REPLAY = SIM_MODE === 'replay';

	let spans = document.getElementById('persona_init_pos').getElementsByTagName('span');
	let persona_names = {};
	for(var i = 0, l = spans.length; i < l; i++){
		let x = spans[i].innerText.split(",");
		persona_names[x[0]] = [parseInt(x[1]), parseInt(x[2])]
	}

	// Phaser 3.0 global settings - FULL SCREEN RESPONSIVE
	const config = {
	  type: Phaser.AUTO,
	  width: window.innerWidth,
	  height: window.innerHeight,
	  parent: "game-container",
	  pixelArt: true,
	  scale: {
	    mode: Phaser.Scale.RESIZE,
	    autoCenter: Phaser.Scale.CENTER_BOTH
	  },
	  physics: {
	    default: "arcade",
	    arcade: {
	      gravity: { y: 0 }
	    }
	  },
	  scene: {
	    preload: preload,
	    create: create,
	    update: update
	  }
	};

	const game = new Phaser.Game(config);
	let showDebug = false;

	// Camera control state
	let isDragging = false;
	let dragStart = { x: 0, y: 0 };
	let scrollStart = { x: 0, y: 0 };
	let zoomLevel = 1.0;
	const zoomMin = 0.3;
	const zoomMax = 3.0;
	const zoomStep = 0.1;
	let mainCamera = null;
	let mapBounds = { width: 0, height: 0 };

	// Day/night cycle
	let nightOverlay = null;

	function parseTimeString(timeStr) {
		// Parse time like "February 13, 2024, 07:00:00" or "07:00 AM"
		// Returns {hour, minute} in 24-hour format
		const match = timeStr.match(/(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(AM|PM)?/i);
		if (!match) return { hour: 12, minute: 0 };  // Default to noon if can't parse

		let hour = parseInt(match[1]);
		const minute = parseInt(match[2]);
		const ampm = match[4];

		if (ampm) {
			// 12-hour format
			if (ampm.toUpperCase() === 'PM' && hour !== 12) hour += 12;
			if (ampm.toUpperCase() === 'AM' && hour === 12) hour = 0;
		}
		// If no AM/PM, assume 24-hour format

		return { hour, minute };
	}

	function calculateDayNightTint(hour, minute = 0) {
		// Hour-keyed ambient color ramp (MULTIPLY blend: the color tints the
		// whole world; alpha is the strength). Replaces the old flat black fade.
		//   night (20-05): deep blue   | dawn (05-08): warm amber ramp-out
		//   day   (08-17): untinted    | dusk (17-20): orange -> deep blue
		const t = hour + minute / 60;
		const NIGHT = { color: 0x2a3560, alpha: 0.5 };
		const DAWN = { color: 0xffd9a0, alpha: 0.18 };
		const DUSK = { color: 0xff9a5c, alpha: 0.22 };
		const lerp = (a, b, k) => a + (b - a) * k;
		const mix = (c1, c2, k) => {
			const r = lerp((c1 >> 16) & 255, (c2 >> 16) & 255, k);
			const g = lerp((c1 >> 8) & 255, (c2 >> 8) & 255, k);
			const b = lerp(c1 & 255, c2 & 255, k);
			return (Math.round(r) << 16) | (Math.round(g) << 8) | Math.round(b);
		};
		if (t >= 8 && t < 17) return { color: 0xffffff, alpha: 0 };
		if (t >= 5 && t < 8) {
			// Night -> dawn amber -> clear, across three hours.
			const k = (t - 5) / 3;
			if (k < 0.5) {
				const kk = k * 2;
				return { color: mix(NIGHT.color, DAWN.color, kk),
					alpha: lerp(NIGHT.alpha, DAWN.alpha, kk) };
			}
			const kk = (k - 0.5) * 2;
			return { color: DAWN.color, alpha: lerp(DAWN.alpha, 0, kk) };
		}
		if (t >= 17 && t < 20) {
			// Clear -> dusk orange -> night, across three hours.
			const k = (t - 17) / 3;
			if (k < 0.5) {
				const kk = k * 2;
				return { color: DUSK.color, alpha: lerp(0, DUSK.alpha, kk) };
			}
			const kk = (k - 0.5) * 2;
			return { color: mix(DUSK.color, NIGHT.color, kk),
				alpha: lerp(DUSK.alpha, NIGHT.alpha, kk) };
		}
		return NIGHT;
	}

	let lastTintKey = null;
	function updateDayNightCycle(timeStr) {
		if (!nightOverlay) return;
		const { hour, minute } = parseTimeString(timeStr);
		const tint = calculateDayNightTint(hour, minute);
		const key = `${tint.color}:${tint.alpha.toFixed(3)}`;
		if (key === lastTintKey) return;  // redraw only when the ramp moves
		lastTintKey = key;
		nightOverlay.clear();
		nightOverlay.fillStyle(tint.color, 1);
		nightOverlay.fillRect(0, 0, mapBounds.width, mapBounds.height);
		nightOverlay.setAlpha(tint.alpha);
	}

	// Persona related variables
	var spawn_tile_loc = {};
	for (var key in persona_names){
		spawn_tile_loc[key] = persona_names[key];
	}

	var personas = {};
	var pronunciatios = {};
	var personaShadows = {};   // soft ellipse under each sprite (juice pass)
	var speechBubbles = {};    // bubble image behind each emoji (juice pass)
	let anims_direction;
	let pre_anims_direction_dict = {};

	// Persona activity tracking for dynamic panel ordering
	let personaLastActivity = {};  // { personaName: timestamp }

	function updatePersonaActivity(personaNames) {
		// Update activity timestamp for active personas
		const now = Date.now();
		for (const name of personaNames) {
			personaLastActivity[name] = now;
		}
		reorderPersonaPanel();
	}

	function reorderPersonaPanel() {
		const panelContent = document.querySelector('#persona-panel .panel-content');
		if (!panelContent) return;

		const cards = Array.from(panelContent.querySelectorAll('.persona-card'));
		if (cards.length === 0) return;

		// Sort cards by last activity (most recent first), then alphabetically for ties
		cards.sort((a, b) => {
			const nameA = a.getAttribute('data-persona-name');
			const nameB = b.getAttribute('data-persona-name');
			const activityA = personaLastActivity[nameA] || 0;
			const activityB = personaLastActivity[nameB] || 0;

			if (activityB !== activityA) {
				return activityB - activityA;  // Most recent first
			}
			return nameA.localeCompare(nameB);  // Alphabetical fallback
		});

		// Reorder DOM elements
		for (const card of cards) {
			panelContent.appendChild(card);
		}
	}

	let curr_maze = "{{ maze_name|default:'the_ville' }}";
	let map_width_px = {{ map_width_px|default:4480 }};
	let map_height_px = {{ map_height_px|default:3200 }};
	let tile_width = 32;
	let movement_speed = 4;

	// Movement display variables
	let pollInProgress = false;
	let execute_movement = null;
	let execute_count_max = tile_width/movement_speed;
	let execute_count = 0;
	let movement_target = {};
	let autoFollowMovement = true;
	let lastMovementPacketAt = Date.now();

	// ==========================================================================
	// Playback Controls
	// ==========================================================================
	let isPaused = true;
	let isSkipping = false;
	let playbackSpeed = 5;
	let animationDelay = 200;
	let lastAnimationTime = 0;
	let playbackState = "paused";
	let latestBackendHealth = null;
	let backendBusy = false;
	let selectedTownCenterRequestId = null;
	let staleRunReloadScheduled = false;

	// ==========================================================================
	// Simulation Control (Frontend-driven)
	// ==========================================================================
	let isSimulating = false;
	let simulationActive = false; // Master switch for auto-simulation
	let queuedMovements = 0;      // Steps queued but not yet animated
	let displayedStep = step;     // Step currently being displayed
	let simulatedStep = step;     // Step simulated on backend
	let lastAppliedMovementStep = step - 1;
	const CLIENT_VERSION = "stream-v2";
	const TARGET_BUFFER = 1;      // Keep playback responsive; one slow LLM step should not block a batch
	const BATCH_SIZE = 1;         // Request one backend step per batch
	// When the backend's autosim producer is running, it drives stepping ahead of
	// the display and the frontend is a PURE CONSUMER: it only polls /movements and
	// replays the deep buffer (smooth playback, decoupled from LLM latency).
	let autosimEnabled = false;

	// CSRF token reader. Django sets the csrftoken cookie via @ensure_csrf_cookie on
	// the page view; non-GET requests must echo it back in the X-CSRFToken header.
	function getCookie(name) {
		const match = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
		return match ? decodeURIComponent(match.pop()) : '';
	}

	// HTML-escape untrusted (LLM/backend-derived) text before interpolating into markup.
	function escapeHtml(value) {
		return String(value == null ? '' : value)
			.replace(/&/g, '&amp;')
			.replace(/</g, '&lt;')
			.replace(/>/g, '&gt;')
			.replace(/"/g, '&quot;')
			.replace(/'/g, '&#39;');
	}

	function setPlaybackState(state) {
		playbackState = state;
		const stateEl = document.getElementById('playback-state-content');
		if (stateEl) stateEl.textContent = state;
	}

	function setDisplayedSimTime(currTime) {
		if (!currTime) return;
		const gameTime = document.getElementById('game-time-content');
		if (gameTime) {
			gameTime.textContent = currTime;
			updateDayNightCycle(currTime);
		}
	}

	function updatePersonaCardFromSnapshot(persona) {
		const personaName = persona?.name;
		if (!personaName) return;
		const personaNameOs = personaName.replace(/ /g, "_");
		const actionEl = document.getElementById("current_action__" + personaNameOs);
		const locationEl = document.getElementById("target_address__" + personaNameOs);
		if (actionEl && persona.action) actionEl.textContent = persona.action;
		if (locationEl && persona.location) locationEl.textContent = persona.location;
	}

	function syncBackendSnapshot(backend) {
		if (!backend?.ok) return;
		if (backend.curr_time && (isPaused || execute_count <= 0)) {
			setDisplayedSimTime(backend.curr_time);
		}
		for (const persona of backend.personas || []) {
			updatePersonaCardFromSnapshot(persona);
		}
	}

	function updateRuntimePanel(health) {
		const panel = document.getElementById('runtime-status-panel');
		const backend = health?.backend || {};
		latestBackendHealth = backend;
		backendBusy = Boolean(backend.backend_busy);
		if (
			!IS_REPLAY &&
			backend.ok &&
			backend.sim_code &&
			backend.sim_code !== sim_code &&
			!staleRunReloadScheduled
		) {
			// Replay pages intentionally show a DIFFERENT (recorded) run than
			// whatever the live backend is doing — never reload them.
			staleRunReloadScheduled = true;
			updateSimStatus('New backend run detected - reloading page', true);
			setTimeout(() => window.location.reload(), 750);
		}

		const backendHealth = document.getElementById('backend-health-content');
		const backendTime = document.getElementById('backend-time-content');
		const backendStep = document.getElementById('backend-step-content');
		const queueDepth = document.getElementById('queue-depth-content');
		const backendBusyEl = document.getElementById('backend-busy-content');

		if (backendHealth) {
			backendHealth.textContent = backend.ok ? (backend.backend_busy ? 'busy' : 'online') : 'offline';
		}
		if (backendTime) backendTime.textContent = backend.curr_time || '--';
		const gameTime = document.getElementById('game-time-content');
		if (gameTime && gameTime.textContent === '--:--' && backend.curr_time) {
			gameTime.textContent = backend.curr_time;
			updateDayNightCycle(backend.curr_time);
		}
		syncBackendSnapshot(backend);
		if (backendStep) backendStep.textContent = backend.step ?? '--';
		if (queueDepth) queueDepth.textContent = backend.movement_queue_depth ?? queuedMovements ?? '--';
		if (backendBusyEl) {
			if (!backend.ok) {
				backendBusyEl.textContent = backend.error || 'unavailable';
			} else if (backend.backend_busy) {
				const seconds = backend.backend_busy_seconds ?? 0;
				const reason = backend.backend_busy_reason || 'working';
				backendBusyEl.textContent = `${reason} (${seconds}s)`;
				backendBusyEl.title = backend.backend_busy_since || '';
			} else {
				backendBusyEl.textContent = 'idle';
				backendBusyEl.title = '';
			}
		}
		if (panel) panel.classList.toggle('backend-down', !backend.ok);
	}

	async function refreshRuntimeHealth() {
		try {
			const response = await fetch("{% url 'api_health' %}");
			const health = await response.json();
			autosimEnabled = !!(health.backend && health.backend.autosim_enabled);
			updateRuntimePanel(health);
			if (isPaused && !isSkipping) {
				setPlaybackState('paused');
			} else if (!health.backend?.ok) {
				updateSimStatus('Backend offline', false);
			} else if (health.backend?.backend_busy) {
				setPlaybackState('backend busy');
				updateSimStatus('Backend busy - waiting for next movement', true);
			} else if (!isPaused && !isSkipping && !isSimulating && playbackState === 'backend busy') {
				setPlaybackState('playing');
				updateSimStatus('Ready', false);
			}
		} catch (error) {
			updateRuntimePanel({ backend: { ok: false, error: String(error) } });
			updateSimStatus('Health check failed', false);
		}
	}

	function formatRevenue(cents) {
		return `$${((cents || 0) / 100).toFixed(2)}`;
	}

	function setTownApprovalButtonsEnabled(enabled) {
		for (const id of [
			'town-approve-request',
			'town-reject-request',
			'town-complete-request',
			'town-fail-request'
		]) {
			const button = document.getElementById(id);
			if (button) button.disabled = !enabled;
		}
	}

	const RISK_ORDER = { critical: 0, high: 1, medium: 2, low: 3, unlabeled: 4 };

	function sortedApprovalQueue(queue) {
		// Risk-first (worst on top), then biggest agent-claimed payoff.
		return queue.slice().sort((a, b) => {
			const ra = RISK_ORDER[(a.payload || {}).risk_label] ?? 4;
			const rb = RISK_ORDER[(b.payload || {}).risk_label] ?? 4;
			if (ra !== rb) return ra - rb;
			const ca = parseFloat((a.payload || {}).expected_payoff) || 0;
			const cb = parseFloat((b.payload || {}).expected_payoff) || 0;
			return cb - ca;
		});
	}

	function updateTownCenterPanel(snapshot) {
		const objective = document.getElementById('town-center-objective');
		const points = document.getElementById('town-points-content');
		const revenue = document.getElementById('town-revenue-content');
		const requests = document.getElementById('town-requests-content');
		const approvals = document.getElementById('town-approvals-content');
		const latest = document.getElementById('town-latest-request');
		const approvalTitle = document.getElementById('town-approval-title');
		const approvalMeta = document.getElementById('town-approval-meta');

		const score = snapshot?.team_score || {};
		const requestList = snapshot?.requests || [];
		const approvalQueue = sortedApprovalQueue(snapshot?.approval_queue || []);
		const latestRequest = requestList[requestList.length - 1];

		// Sticky selection: keep the operator's chosen request while it is still
		// pending; otherwise fall back to the top of the (risk-sorted) queue.
		let activeApproval =
			approvalQueue.find(r => r.id === selectedTownCenterRequestId) || null;
		if (!activeApproval) {
			activeApproval = approvalQueue[0] || null;
			selectedTownCenterRequestId = activeApproval?.id || null;
		}

		if (objective) objective.textContent = snapshot?.scenario?.objective || 'Scenario unavailable';
		if (points) points.textContent = score.points ?? 0;
		if (revenue) revenue.textContent = formatRevenue(score.revenue_cents);
		if (requests) requests.textContent = requestList.length;
		if (approvals) approvals.textContent = snapshot?.pending_approval_count ?? 0;
		if (approvalTitle) {
			approvalTitle.textContent = activeApproval
				? activeApproval.title
				: 'No pending approvals';
			approvalTitle.title = approvalTitle.textContent;
		}
		if (approvalMeta) {
			approvalMeta.textContent = activeApproval
				? `${activeApproval.actor || 'unknown'} - ${activeApproval.type || 'request'}`
				: '--';
			approvalMeta.title = approvalMeta.textContent;
		}
		setTownApprovalButtonsEnabled(Boolean(activeApproval));
		if (latest) {
			latest.textContent = latestRequest
				? `${latestRequest.current_state}: ${latestRequest.title}`
				: 'No requests yet';
			latest.title = latest.textContent;
		}
		renderTownQueue(approvalQueue);
		updateTownApprovalDetail(activeApproval);
		updateTownArtifacts(snapshot?.artifacts || []);
		updateTownDeliveryOptions(requestList);
		notifyNewApprovals(approvalQueue);
	}

	function renderTownQueue(queue) {
		const list = document.getElementById('town-queue-list');
		const title = document.getElementById('town-queue-title');
		if (!list) return;
		if (title) title.textContent = `Approval queue (${queue.length})`;
		list.textContent = '';
		for (const req of queue) {
			const row = document.createElement('div');
			row.className = 'town-queue-row'
				+ (req.id === selectedTownCenterRequestId ? ' selected' : '');
			const risk = (req.payload || {}).risk_label || 'unlabeled';
			const dot = document.createElement('span');
			dot.className = `town-risk-dot risk-${risk}`;
			dot.title = `risk: ${risk}`;
			const label = document.createElement('span');
			label.className = 'town-queue-label';
			label.textContent = `${req.actor || '?'}: ${req.title || '(untitled)'}`;
			label.title = label.textContent;
			row.appendChild(dot);
			row.appendChild(label);
			row.addEventListener('click', () => {
				selectedTownCenterRequestId = req.id;
				refreshTownCenter();
			});
			list.appendChild(row);
		}
	}

	// All agent-authored text below is set via textContent (never innerHTML) so
	// a hostile draft can't inject markup into the console (LLM-1 in the DOM).
	function updateTownApprovalDetail(approval) {
		const detail = document.getElementById('town-approval-detail');
		if (!detail) return;
		if (!approval) {
			detail.classList.add('hidden');
			return;
		}
		const payload = approval.payload || {};
		detail.classList.remove('hidden');
		const tool = document.getElementById('town-detail-tool');
		const risk = document.getElementById('town-detail-risk');
		const claimed = document.getElementById('town-detail-claimed');
		const preview = document.getElementById('town-detail-preview');
		if (tool) tool.textContent = payload.tool || payload.requested_tool || 'none';
		if (risk) risk.textContent = payload.risk_label || 'unlabeled';
		if (claimed) claimed.textContent = payload.expected_payoff
			? `${payload.expected_payoff} (agent claim, unverified)`
			: '--';
		if (preview) preview.textContent = payload.preview
			? String(payload.preview)
			: '(no draft preview attached)';
	}

	// Artifact browser: every executed ToolResult (incl. DRY-RUN drafts) is
	// browsable with its FULL sanitized body — the draft an email WOULD have
	// sent is the most consequential thing an operator reviews.
	function updateTownArtifacts(artifacts) {
		const toggle = document.getElementById('town-artifacts-toggle');
		const list = document.getElementById('town-artifacts-list');
		if (!toggle || !list) return;
		const expanded = !list.classList.contains('hidden');
		toggle.textContent = `Artifacts (${artifacts.length}) ${expanded ? '▾' : '▸'}`;
		if (!expanded) return;
		list.textContent = '';
		for (const artifact of artifacts.slice().reverse()) {
			const result = artifact.tool_result || {};
			const row = document.createElement('div');
			row.className = 'town-artifact-row';
			const head = document.createElement('div');
			head.className = 'town-artifact-head';
			head.textContent =
				`${artifact.dry_run ? '[DRY-RUN] ' : ''}${artifact.actor || '?'} — ` +
				`${result.summary || artifact.title || artifact.tool || 'result'}`;
			head.title = 'Click to expand';
			const body = document.createElement('div');
			body.className = 'town-artifact-body hidden';
			const bodyText = [
				result.detail || '',
				result.evidence && result.evidence.preview
					? `--- draft ---\n${result.evidence.preview}` : '',
			].filter(Boolean).join('\n');
			body.textContent = bodyText || '(no detail body)';
			head.addEventListener('click', () => body.classList.toggle('hidden'));
			row.appendChild(head);
			row.appendChild(body);
			list.appendChild(row);
		}
	}

	function updateTownDeliveryOptions(requestList) {
		const select = document.getElementById('town-delivery-request');
		if (!select) return;
		const completed = requestList.filter(r => r.current_state === 'completed');
		const previous = select.value;
		select.textContent = '';
		if (!completed.length) {
			const option = document.createElement('option');
			option.value = '';
			option.textContent = 'No completed requests yet';
			select.appendChild(option);
			return;
		}
		for (const req of completed) {
			const option = document.createElement('option');
			option.value = req.id;
			option.textContent = `${req.title} — ${req.actor || '?'}`;
			select.appendChild(option);
		}
		if (previous && completed.some(r => r.id === previous)) {
			select.value = previous;
		}
	}

	function setTownDeliveryStatus(message, isError) {
		const status = document.getElementById('town-delivery-status');
		if (!status) return;
		status.textContent = message || '';
		status.classList.toggle('error', Boolean(isError));
	}

	async function recordTownDelivery() {
		const select = document.getElementById('town-delivery-request');
		const amountInput = document.getElementById('town-delivery-amount');
		const evidenceInput = document.getElementById('town-delivery-evidence');
		const requestId = select ? select.value : '';
		const evidence = evidenceInput ? evidenceInput.value.trim() : '';
		const dollars = amountInput ? parseFloat(amountInput.value) : NaN;
		if (!requestId) {
			setTownDeliveryStatus('Pick a completed request first.', true);
			return;
		}
		if (!evidence) {
			setTownDeliveryStatus('Evidence is required (invoice #, payment ref).', true);
			return;
		}
		if (!Number.isFinite(dollars) || dollars < 0) {
			setTownDeliveryStatus('Enter a valid non-negative USD amount.', true);
			return;
		}
		const deliveryUrl = "{% url 'api_town_center_record_delivery' 'REQUEST_ID' %}"
			.replace('REQUEST_ID', encodeURIComponent(requestId));
		try {
			const response = await fetch(deliveryUrl, {
				method: 'POST',
				headers: {
					'Content-Type': 'application/json',
					'X-CSRFToken': getCookie('csrftoken')
				},
				body: JSON.stringify({
					revenue_cents: Math.round(dollars * 100),
					evidence: evidence,
					reviewer: 'human'
				})
			});
			const result = await response.json();
			if (!response.ok) {
				setTownDeliveryStatus(result.error || `Failed (${response.status})`, true);
			} else if (result.already_recorded) {
				setTownDeliveryStatus('Already recorded for this request.', true);
			} else {
				setTownDeliveryStatus(
					`Recorded ${formatRevenue(result.revenue_cents)} for ${result.actor}.`, false);
				if (amountInput) amountInput.value = '';
				if (evidenceInput) evidenceInput.value = '';
			}
		} catch (error) {
			setTownDeliveryStatus(`Request failed: ${error}`, true);
		}
		await refreshTownCenter();
	}

	async function refreshTownCenter() {
		try {
			const response = await fetch("{% url 'api_town_center' %}");
			const snapshot = await response.json();

		const note = (noteInput ? noteInput.value.trim() : '')

			.replace('REQUEST_ID', encodeURIComponent(selectedTownCenterRequestId));

					state: state,

					// approve + execute + artifact + agent memory feed.
					execute: state === 'approved'
				})
			});

	let knownPendingApprovalIds = null;  // null until first snapshot (no boot spam)
	const baseDocumentTitle = document.title;

	function ensureNotificationPermission() {
		if ('Notification' in window && Notification.permission === 'default') {

	function playSummonsChime() {
		try {
			const ctx = new (window.AudioContext || window.webkitAudioContext)();
			const osc = ctx.createOscillator();
			const gain = ctx.createGain();
			osc.type = 'sine';
			osc.frequency.value = 880;
			gain.gain.setValueAtTime(0.08, ctx.currentTime);
			gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.4);
			osc.connect(gain).connect(ctx.destination);
			osc.start();
			osc.stop(ctx.currentTime + 0.4);
		} catch (e) { /* audio blocked until user gesture — fine */ }
	}

	function showToast(message) {
		const toast = document.createElement('div');
		toast.className = 'town-toast';
		toast.textContent = message;
		document.body.appendChild(toast);
		setTimeout(() => toast.classList.add('visible'), 20);
		setTimeout(() => {
			toast.classList.remove('visible');
			setTimeout(() => toast.remove(), 400);
		}, 6000);
	}

	function notifyNewApprovals(queue) {
		const ids = new Set(queue.map(r => r.id));
		// Title badge always reflects backlog size.
		document.title = ids.size > 0
			? `(${ids.size}) ${baseDocumentTitle}`
			: baseDocumentTitle;
		if (knownPendingApprovalIds === null) {
			knownPendingApprovalIds = ids;  // first snapshot: baseline, no alerts
			return;
		}
		const fresh = queue.filter(r => !knownPendingApprovalIds.has(r.id));
		knownPendingApprovalIds = ids;
		if (!fresh.length) return;
		const first = fresh[0];
		const message = fresh.length === 1
			? `${first.actor || 'An agent'} requests approval: ${first.title || ''}`
			: `${fresh.length} new approval requests (first: ${first.title || ''})`;
		showToast(message);
		playSummonsChime();
		if ('Notification' in window && Notification.permission === 'granted'
			&& document.hidden) {
			const n = new Notification('Claudeville needs you', { body: message });
			n.onclick = () => { window.focus(); n.close(); };
		}
	}

	async function requestSimulation(numSteps, forceRequest = false) {
		if (isSimulating || (backendBusy && !forceRequest)) return;
		isSimulating = true;
		setPlaybackState('simulating');
		updateSimStatus('Simulating...', true);

		try {
			const response = await fetch("{% url 'api_simulate' %}", {
				method: 'POST',
				headers: {
					'Content-Type': 'application/json',
					'X-Claudeville-Client': CLIENT_VERSION,
					'X-CSRFToken': getCookie('csrftoken')
				},
				body: JSON.stringify({ steps: numSteps })
			});
			const result = await response.json();
			if (response.status === 504) {
				backendBusy = true;
				setPlaybackState('backend busy');
				updateSimStatus('Backend timeout - waiting for completion', true);
			} else if (result.status === 'ok') {
				backendBusy = false;
				simulatedStep = result.current_step;
				queuedMovements = result.queued_movements;
			} else if (result.status === 'busy') {
				backendBusy = true;
				queuedMovements = result.queued_movements ?? queuedMovements;
				setPlaybackState('backend busy');
				updateSimStatus('Backend busy - waiting for next movement', true);
			} else if (result.error) {
				console.error('[SIM] Backend error:', result.error);
				handleSimulationError(result.error);
			}
		} catch (error) {
			console.error('[SIM] Request failed:', error);
			handleSimulationError(String(error));
		}

		isSimulating = false;
		if (isPaused && !isSkipping) {
			setPlaybackState('paused');
		} else if (backendBusy) {
			setPlaybackState('backend busy');
		} else if (!isPaused && !isSkipping && playbackState !== 'backend busy') {
			setPlaybackState('playing');
		}
		if (simulationActive && !backendBusy) {
			updateSimStatus('Ready', false);
		}
		refreshRuntimeHealth();
	}

	function handlePolledMovementResult(result) {
		if (!result.hasMovements) return false;

		queuedMovements = Math.max(0, queuedMovements - 1);

		if (result.hadNewAction) {
			const activePersonas = result.movement.meta?.active_personas || [];
			if (activePersonas.length > 0) {
				updatePersonaActivity(activePersonas);
			}
		}

		if (isSkipping && result.hadNewAction) {
			handleSkipActionFound(result.movement);
		}

		return true;
	}

	async function kickPlaybackPipeline(forceRequest = false) {
		if (!simulationActive || isPaused || isSkipping || isMenuOpen()) return;
		if (execute_count > 0 || pollInProgress) return;

		pollInProgress = true;
		const result = await pollMovements();
		pollInProgress = false;

		if (handlePolledMovementResult(result)) return;

		// autosim drives stepping on the backend; consumer only polls (above).
		if (!autosimEnabled && simulationActive && !isSimulating && queuedMovements <= TARGET_BUFFER) {
			requestSimulation(BATCH_SIZE, forceRequest);
		}
	}

	function handleSimulationError(message) {
		simulationActive = false;
		isPaused = true;
		isSkipping = false;
		setPlaybackState('paused');
		updateButtonStates();
		updateSimStatus('Simulation error - check backend status', false);
		console.error('[SIM] Auto-simulation paused:', message);
	}

	// Honest latency: while a busy state is showing, tick an elapsed counter
	// onto the chip so 90s of Claude inference reads as progress, not a hang.
	let simStatusBaseText = '';
	let simStatusBusySince = 0;
	let firstPlayThisLoad = true;

	setInterval(() => {
		if (!simStatusBusySince) return;
		const textEl = document.getElementById('sim-status-text');
		if (!textEl) return;
		const elapsed = Math.floor((Date.now() - simStatusBusySince) / 1000);
		if (elapsed >= 2) textEl.textContent = `${simStatusBaseText} (${elapsed}s)`;
	}, 1000);

	function updateSimStatus(text, simulating) {
		const statusEl = document.getElementById('sim-status');
		const textEl = document.getElementById('sim-status-text');
		if (text !== simStatusBaseText) {
			// New phase: restart the elapsed counter.
			simStatusBusySince = simulating ? Date.now() : 0;
		} else if (!simulating) {
			simStatusBusySince = 0;
		}
		simStatusBaseText = text;
		if (textEl) textEl.textContent = text;
		if (statusEl) {
			if (simulating) {
				statusEl.classList.add('simulating');
			} else {
				statusEl.classList.remove('simulating');
			}
		}
	}

	function calculateMovementFrameCount(movement) {
		let maxDistance = tile_width;
		for (const [personaName, movementData] of Object.entries(movement?.persona || {})) {
			const sprite = personas[personaName];
			const targetTile = movementData?.movement;
			if (!sprite || !targetTile || targetTile.length < 2) continue;
			const targetX = targetTile[0] * tile_width;
			const targetY = targetTile[1] * tile_width;
			const distance = Math.abs(sprite.body.x - targetX) + Math.abs(sprite.body.y - targetY);
			maxDistance = Math.max(maxDistance, distance);
		}
		return Math.max(tile_width / movement_speed, Math.ceil(maxDistance / movement_speed));
	}

	// Camera follow (juice pass): a lerped startFollow instead of the old
	// discrete pan() jumps. `followedPersona` tracks the current target;
	// null = free camera. Exposed on window for the inspector + event feed.
	let followedPersona = null;

	function setCameraFollowTarget(personaName) {
		if (!mainCamera) return;
		if (!personaName || !personas[personaName]) {
			mainCamera.stopFollow();
			followedPersona = null;
			return;
		}
		followedPersona = personaName;
		mainCamera.startFollow(personas[personaName], true, 0.08, 0.08);
	}
	window.setCameraFollowTarget = setCameraFollowTarget;

	window.panCameraToTile = function (tileX, tileY) {
		if (!mainCamera) return;
		setCameraFollowTarget(null);
		mainCamera.pan(tileX * tile_width, tileY * tile_width, 450, 'Power2');
	};

	function focusMovementTarget(movement) {
		if (!autoFollowMovement || !mainCamera || isDragging) return;

		const personaEntries = Object.entries(movement?.persona || {});
		const activeNames = movement?.meta?.active_personas || [];
		const preferredEntries = [
			...activeNames
				.map(name => [name, movement.persona?.[name]])
				.filter(([, data]) => data),
			...personaEntries
		];

		for (const [personaName, movementData] of preferredEntries) {
			const sprite = personas[personaName];
			const targetTile = movementData?.movement;
			if (!sprite || !targetTile || targetTile.length < 2) continue;

			const targetX = targetTile[0] * tile_width;
			const targetY = targetTile[1] * tile_width;
			const isMoving = Math.abs(sprite.body.x - targetX) > 1 || Math.abs(sprite.body.y - targetY) > 1;
			const isActive = activeNames.includes(personaName);
			if (isMoving || isActive) {
				if (followedPersona !== personaName) {
					setCameraFollowTarget(personaName);
				}
				return;
			}
		}
	}

	// ==========================================================================
	// Movement Polling
	// ==========================================================================

	async function pollMovements() {
		try {
			const movementsUrl = `{% url 'api_movements' %}?after_step=${lastAppliedMovementStep}`;
			const response = await fetch(movementsUrl, {
				headers: { 'X-Claudeville-Client': CLIENT_VERSION }
			});
			const result = await response.json();

			if (result.empty) {
				queuedMovements = 0;  // Backend queue is empty, reset our count
				if (!isPaused && !isSimulating) {
					setPlaybackState(backendBusy ? 'backend busy' : 'buffering');
				}
				await new Promise(r => setTimeout(r, 500));
				return { hasMovements: false, hadNewAction: false };
			}

			if (result.error) {
				console.error('[POLL] Error:', result.error);
				await new Promise(r => setTimeout(r, 1000));
				return { hasMovements: false, hadNewAction: false };
			}

			const movementStep = result.meta?.step;
			if (typeof movementStep === 'number' && movementStep <= lastAppliedMovementStep) {
				return { hasMovements: false, hadNewAction: false };
			}

			execute_movement = result;
			execute_count_max = calculateMovementFrameCount(result);
			execute_count = execute_count_max;
			lastMovementPacketAt = Date.now();
			focusMovementTarget(result);
			if (!isPaused && !isSkipping) setPlaybackState('playing');
			const hadNewAction = result.meta && result.meta.had_new_action;
			return { hasMovements: true, hadNewAction: hadNewAction, movement: result };

		} catch (error) {
			console.error('[POLL] Request failed:', error);
			await new Promise(r => setTimeout(r, 1000));
			return { hasMovements: false, hadNewAction: false };
		}
	}

	// Skip mode just sets a flag - the update() loop handles the rest
	// When skipping: runs at max speed, auto-pauses when LLM action detected
	function startSkipMode() {
		isSkipping = true;
		isPaused = false;  // Unpause to let update() run
		setPlaybackState('skipping');
		updateButtonStates();
		updateSimStatus('Skipping to next action...', false);
	}

	// Called when we detect an LLM action during skip mode
	function handleSkipActionFound(movement) {
		if (!isSkipping) return;

		const activePersonas = movement.meta?.active_personas || [];
		if (activePersonas.length > 0) {
			// Center on the first active persona
			const personaName = activePersonas[0];
			const personaData = movement.persona[personaName];
			if (personaData && mainCamera) {
				const targetX = personaData.movement[0] * tile_width;
				const targetY = personaData.movement[1] * tile_width;
				mainCamera.pan(targetX, targetY, 300, 'Power2');
				console.log('[SKIP] Centering on active persona:', personaName);
			}
		}

		// Stop skipping and pause
		isSkipping = false;
		isPaused = true;
		setPlaybackState('paused');
		updateButtonStates();
		updateSimStatus('Ready', false);
	}

	function getAnimationDelay() {
		// Use selected speed for both normal and skip mode
		// Scale delay: speed 1 = 400ms, speed 50 = 10ms
		return Math.max(10, Math.floor(400 / playbackSpeed));
	}

	function animateMovements() {
		if (!execute_movement || execute_count <= 0) {
			return true;
		}

		const currTime = execute_movement["meta"]["curr_time"];
		document.getElementById("game-time-content").textContent = currTime;
		updateDayNightCycle(currTime);
		if (execute_count == execute_count_max) {
			updateChatPopup(execute_movement);
		}

		for (let i = 0; i < Object.keys(personas).length; i++) {
			let curr_persona_name = Object.keys(personas)[i];
			let curr_persona = personas[curr_persona_name];
			let curr_pronunciatio = pronunciatios[curr_persona_name];
			const movementData = execute_movement?.["persona"]?.[curr_persona_name];
			if (!movementData) {
				movement_target[curr_persona_name] = [curr_persona.body.x, curr_persona.body.y];
				continue;
			}

			if (execute_count == execute_count_max) {
				let curr_x = movementData["movement"][0];
				let curr_y = movementData["movement"][1];
				movement_target[curr_persona_name] = [curr_x * tile_width, curr_y * tile_width];

				let pronunciatio_content = movementData["pronunciatio"];
				if (pronunciatios[curr_persona_name].text !== pronunciatio_content) {
					pronunciatios[curr_persona_name].setText(pronunciatio_content);
					// Pop-in: bubble + emoji scale up together on a new thought.
					const bubbleSprite = speechBubbles[curr_persona_name];
					const scene = curr_persona.scene;
					if (bubbleSprite && scene) {
						scene.tweens.add({
							targets: bubbleSprite,
							scaleX: { from: bubbleSprite.baseScaleX * 0.2, to: bubbleSprite.baseScaleX },
							scaleY: { from: bubbleSprite.baseScaleY * 0.2, to: bubbleSprite.baseScaleY },
							duration: 200,
							ease: 'Back.easeOut',
						});
						scene.tweens.add({
							targets: pronunciatios[curr_persona_name],
							scaleX: { from: 0.2, to: 1 },
							scaleY: { from: 0.2, to: 1 },
							duration: 200,
							ease: 'Back.easeOut',
						});
					}
				}

				let curr_persona_name_os = curr_persona_name.replace(/ /g, "_");
				let description_content = movementData["description"] || "";

				document.getElementById("current_action__" + curr_persona_name_os).textContent = description_content.split("@")[0];
				document.getElementById("target_address__" + curr_persona_name_os).textContent = description_content.split("@")[1] || "";
			}

			if (curr_persona.body.x < movement_target[curr_persona_name][0]) {
				curr_persona.body.x += movement_speed;
				anims_direction = "r";
				pre_anims_direction_dict[curr_persona_name] = "r";
			} else if (curr_persona.body.x > movement_target[curr_persona_name][0]) {
				curr_persona.body.x -= movement_speed;
				anims_direction = "l";
				pre_anims_direction_dict[curr_persona_name] = "l";
			} else if (curr_persona.body.y < movement_target[curr_persona_name][1]) {
				curr_persona.body.y += movement_speed;
				anims_direction = "d";
				pre_anims_direction_dict[curr_persona_name] = "d";
			} else if (curr_persona.body.y > movement_target[curr_persona_name][1]) {
				curr_persona.body.y -= movement_speed;
				anims_direction = "u";
				pre_anims_direction_dict[curr_persona_name] = "u";
			} else {
				anims_direction = "";
			}

			curr_pronunciatio.x = curr_persona.body.x + 16;  // Center over sprite (sprite is 32px wide)
			curr_pronunciatio.y = curr_persona.body.y - 46;  // Centered in the bubble
			const followBubble = speechBubbles[curr_persona_name];
			if (followBubble) {
				followBubble.x = curr_persona.body.x + 16;
				followBubble.y = curr_persona.body.y - 30;
			}
			const followShadow = personaShadows[curr_persona_name];
			if (followShadow) {
				followShadow.x = curr_persona.body.x + 16;
				followShadow.y = curr_persona.body.y + 60;
			}

			let animKey = curr_persona.spriteKey || "fallback";
			if (anims_direction == "l") {
				curr_persona.anims.play(animKey + "-left-walk", true);
			} else if (anims_direction == "r") {
				curr_persona.anims.play(animKey + "-right-walk", true);
			} else if (anims_direction == "u") {
				curr_persona.anims.play(animKey + "-back-walk", true);
			} else if (anims_direction == "d") {
				curr_persona.anims.play(animKey + "-front-walk", true);
			} else {
				curr_persona.anims.stop();

				// Determine facing direction: face conversation partner if chatting
				let facing_direction = pre_anims_direction_dict[curr_persona_name];
				let chatting_with = movementData?.["chatting_with"];
				if (chatting_with && personas[chatting_with]) {
					let partner = personas[chatting_with];
					let dx = partner.body.x - curr_persona.body.x;
					let dy = partner.body.y - curr_persona.body.y;
					// Face the direction with the larger difference
					if (Math.abs(dx) > Math.abs(dy)) {
						facing_direction = dx > 0 ? "r" : "l";
					} else {
						facing_direction = dy > 0 ? "d" : "u";
					}
				}

				if (curr_persona.spriteKey) {
					if (facing_direction == "l") curr_persona.setFrame(4);
					else if (facing_direction == "r") curr_persona.setFrame(7);
					else if (facing_direction == "u") curr_persona.setFrame(10);
					else if (facing_direction == "d") curr_persona.setFrame(1);
				} else {
					if (facing_direction == "l") curr_persona.setTexture("atlas", "left");
					else if (facing_direction == "r") curr_persona.setTexture("atlas", "right");
					else if (facing_direction == "u") curr_persona.setTexture("atlas", "up");
					else if (facing_direction == "d") curr_persona.setTexture("atlas", "down");
				}
			}
		}

		execute_count--;

		if (execute_count <= 0) {
			for (let persona_name in personas) {
				personas[persona_name].body.x = movement_target[persona_name][0];
				personas[persona_name].body.y = movement_target[persona_name][1];
			}
			const movementStep = execute_movement?.["meta"]?.["step"];
			if (typeof movementStep === 'number') {
				lastAppliedMovementStep = Math.max(lastAppliedMovementStep, movementStep);
				step = lastAppliedMovementStep + 1;
				displayedStep = step;
			}
			execute_movement = null;
			return true;
		}

		return false;
	}

	function create() {
	  if (curr_maze === "the_ville") {
	  const map = this.make.tilemap({ key: "map" });

	  const interiors_pt4 = map.addTilesetImage("interiors_pt4", "interiors_pt4");
	  const interiors_pt5 = map.addTilesetImage("interiors_pt5", "interiors_pt5");
	  const CuteRPG_Field_B = map.addTilesetImage("CuteRPG_Field_B", "CuteRPG_Field_B");

	  const CuteRPG_Desert_C = map.addTilesetImage("CuteRPG_Desert_C", "CuteRPG_Desert_C");

	  const CuteRPG_Forest_C = map.addTilesetImage("CuteRPG_Forest_C", "CuteRPG_Forest_C");

	  let tileset_group_1 = [CuteRPG_Field_B, CuteRPG_Field_C, CuteRPG_Harbor_C, CuteRPG_Village_B,
	  											 CuteRPG_Forest_B, CuteRPG_Desert_C, CuteRPG_Mountains_B, CuteRPG_Desert_B, CuteRPG_Forest_C,
	  											 interiors_pt1, interiors_pt2, interiors_pt3, interiors_pt4, interiors_pt5, walls];

	  const bottomGroundLayer = map.createLayer("Bottom Ground", tileset_group_1, 0, 0);
	  const exteriorGroundLayer = map.createLayer("Exterior Ground", tileset_group_1, 0, 0);
	  const exteriorDecorationL1Layer = map.createLayer("Exterior Decoration L1", tileset_group_1, 0, 0);
	  const exteriorDecorationL2Layer = map.createLayer("Exterior Decoration L2", tileset_group_1, 0, 0);
	  const interiorGroundLayer = map.createLayer("Interior Ground", tileset_group_1, 0, 0);
	  const wallLayer = map.createLayer("Wall", [CuteRPG_Field_C, walls], 0, 0);
	  const interiorFurnitureL1Layer = map.createLayer("Interior Furniture L1", tileset_group_1, 0, 0);
	  const interiorFurnitureL2Layer = map.createLayer("Interior Furniture L2 ", tileset_group_1, 0, 0);
	  const foregroundL1Layer = map.createLayer("Foreground L1", tileset_group_1, 0, 0);
	  const foregroundL2Layer = map.createLayer("Foreground L2", tileset_group_1, 0, 0);
	  foregroundL1Layer.setDepth(2);
	  foregroundL2Layer.setDepth(2);

	  const collisionsLayer = map.createLayer("Collisions", collisions, 0, 0);
	  collisionsLayer.setCollisionByProperty({ collide: true });
	  collisionsLayer.setDepth(-1);

	  mapBounds = { width: map.widthInPixels, height: map.heightInPixels };
	  } else {
	  // Non-the_ville world (e.g. claudeville): render the prebuilt PNG as a flat
	  // background. Collision/zones come from the backend matrices, not tile layers.
	    this.add.image(0, 0, "world_bg").setOrigin(0, 0).setDepth(-1);
	    mapBounds = { width: map_width_px, height: map_height_px };
	  }

	  // *** SET UP CAMERA - Mouse drag panning ***
	  const camera = this.cameras.main;
	  mainCamera = camera;

	  camera.setBounds(0, 0, mapBounds.width, mapBounds.height);
	  camera.centerOn(mapBounds.width / 2, mapBounds.height / 2);

	  // Mouse drag panning
	  this.input.on('pointerdown', function(pointer) {
	    if (pointer.button === 0) {  // Left mouse button
	      isDragging = true;
	      dragStart.x = pointer.x;
	      dragStart.y = pointer.y;
	      scrollStart.x = camera.scrollX;
	      scrollStart.y = camera.scrollY;
	    }
	  });

	  this.input.on('pointermove', function(pointer) {
	    if (isDragging && pointer.isDown) {
	      // Manual pan takes the wheel: stop fighting the follow camera.
	      if (typeof setCameraFollowTarget === 'function') setCameraFollowTarget(null);
	      const dx = pointer.x - dragStart.x;
	      const dy = pointer.y - dragStart.y;
	      camera.scrollX = scrollStart.x - dx / camera.zoom;
	      camera.scrollY = scrollStart.y - dy / camera.zoom;
	    }
	  });

	  this.input.on('pointerup', function(pointer) {
	    isDragging = false;
	  });

	  // Mouse wheel zoom — pointer-centered: the world point under the cursor
	  // stays under the cursor while zooming (the old version zoomed on the
	  // camera center, drifting away from what you were looking at).
	  this.input.on('wheel', function(pointer, gameObjects, deltaX, deltaY, deltaZ) {
	    const worldBefore = camera.getWorldPoint(pointer.x, pointer.y);
	    if (deltaY < 0) {
	      zoomLevel = Math.min(zoomMax, zoomLevel + zoomStep);
	    } else if (deltaY > 0) {
	      zoomLevel = Math.max(zoomMin, zoomLevel - zoomStep);
	    }
	    camera.setZoom(zoomLevel);
	    if (!camera._follow) {
	      const worldAfter = camera.getWorldPoint(pointer.x, pointer.y);
	      camera.scrollX += worldBefore.x - worldAfter.x;
	      camera.scrollY += worldBefore.y - worldAfter.y;
	    }

	    const zoomIndicator = document.getElementById('zoom-indicator');
	    if (zoomIndicator) {
	      zoomIndicator.textContent = Math.round(zoomLevel * 100) + '%';
	    }
	  });

	  // Handle window resize
	  this.scale.on('resize', function(gameSize) {
	    camera.setViewport(0, 0, gameSize.width, gameSize.height);
	  });

	  // *** SET UP PERSONAS ***
	  const anims = this.anims;

	  for (let i=0; i<Object.keys(spawn_tile_loc).length; i++) {
	    let persona_name = Object.keys(spawn_tile_loc)[i];
	    let sprite_key = persona_name.replace(/ /g, "_");
	    // Use same coordinate system as movement_target in animateMovements()
	    let start_pos = [spawn_tile_loc[persona_name][0] * tile_width,
	                     spawn_tile_loc[persona_name][1] * tile_width];

	    let new_sprite;
	    if (this.textures.exists(sprite_key)) {
	      new_sprite = this.physics.add
	                       .sprite(start_pos[0], start_pos[1], sprite_key, 1)
	                       .setSize(30, 40)
	                       .setOffset(0, 32);

	      anims.create({
	        key: sprite_key + "-front-walk",
	        frames: anims.generateFrameNumbers(sprite_key, { frames: [0, 1, 2, 1] }),
	        frameRate: 4,
	        repeat: -1 });

	      anims.create({
	        key: sprite_key + "-left-walk",
	        frames: anims.generateFrameNumbers(sprite_key, { frames: [3, 4, 5, 4] }),
	        frameRate: 4,
	        repeat: -1 });

	      anims.create({
	        key: sprite_key + "-right-walk",
	        frames: anims.generateFrameNumbers(sprite_key, { frames: [6, 7, 8, 7] }),
	        frameRate: 4,
	        repeat: -1 });

	      anims.create({
	        key: sprite_key + "-back-walk",
	        frames: anims.generateFrameNumbers(sprite_key, { frames: [9, 10, 11, 10] }),
	        frameRate: 4,
	        repeat: -1 });
	    } else {
	      new_sprite = this.physics.add
	                       .sprite(start_pos[0], start_pos[1], "atlas", "down")
	                       .setSize(30, 40)
	                       .setOffset(0, 32);
	    }

	    personas[persona_name] = new_sprite;
	    personas[persona_name].spriteKey = this.textures.exists(sprite_key) ? sprite_key : null;
	    new_sprite.setDepth(2.3);  // Above foreground (2), below night overlay (2.5)

	    // Initialize movement target to match spawn position
	    movement_target[persona_name] = [start_pos[0], start_pos[1]];

	    // Soft contact shadow under the sprite (grounds it visually).
	    const shadow = this.add.ellipse(
	      start_pos[0] + 16, start_pos[1] + 60, 22, 9, 0x000000, 0.3
	    );
	    shadow.setDepth(2.25);
	    personaShadows[persona_name] = shadow;

	    // Real speech bubble + emoji, ABOVE the night overlay (2.6) so thought
	    // indicators stay readable after dark.
	    const bubble = this.add.image(
	      start_pos[0] + 16, start_pos[1] - 30, "speech_bubble"
	    );
	    bubble.setOrigin(0.5, 1);
	    bubble.setDisplaySize(46, 30);
	    bubble.setDepth(2.6);
	    // setDisplaySize works via scale — remember it so pop tweens land here.
	    bubble.baseScaleX = bubble.scaleX;
	    bubble.baseScaleY = bubble.scaleY;
	    speechBubbles[persona_name] = bubble;

	    const emojiText = this.add.text(
	      start_pos[0] + 16,
	      start_pos[1] - 46,
	      "💭",
	      {
	        font: "15px sans-serif",
	        resolution: 2,
	      }
	    );
	    emojiText.setOrigin(0.5, 0.5);  // Centered inside the bubble
	    emojiText.setDepth(2.61);
	    pronunciatios[persona_name] = emojiText;
	  }

	  // Fallback local atlas animations
	  anims.create({
	    key: "fallback-left-walk",
	    frames: anims.generateFrameNames("atlas", { prefix: "left-walk.", start: 0, end: 3, zeroPad: 3 }),
	    frameRate: 4,
	    repeat: -1 });

	  anims.create({
	    key: "fallback-right-walk",
	    frames: anims.generateFrameNames("atlas", { prefix: "right-walk.", start: 0, end: 3, zeroPad: 3 }),
	    frameRate: 4,
	    repeat: -1 });

	  anims.create({
	    key: "fallback-front-walk",
	    frames: anims.generateFrameNames("atlas", { prefix: "down-walk.", start: 0, end: 3, zeroPad: 3 }),
	    frameRate: 4,
	    repeat: -1 });

	  anims.create({
	    key: "fallback-back-walk",
	    frames: anims.generateFrameNames("atlas", { prefix: "up-walk.", start: 0, end: 3, zeroPad: 3 }),
	    frameRate: 4,
	    repeat: -1 });

	  // Create day/night overlay (covers entire map, above all tile layers but below personas)
	  // Uses a dark blue tint that fades based on time of day
	  const graphics = this.add.graphics();
	  graphics.fillStyle(0x0a0a20, 1);  // Darker blue-purple night color
	  graphics.fillRect(0, 0, mapBounds.width, mapBounds.height);
	  nightOverlay = graphics;
	  nightOverlay.setDepth(2.5);  // Above foreground + sprites; bubbles sit above at 2.6
	  nightOverlay.setBlendMode(Phaser.BlendModes.MULTIPLY);  // tints, not blackout
	  nightOverlay.setAlpha(0);   // Start with no overlay (daytime)
	}


	function update(time, delta) {
	  // Skip if paused or menu open (but NOT if skipping - we want to run fast during skip)
	  if (isPaused || isMenuOpen()) {
	    return;
	  }

	  // Throttle animation speed (getAnimationDelay returns 0 during skip mode)
	  const now = Date.now();
	  if (now - lastAnimationTime < getAnimationDelay()) {
	    return;
	  }
	  lastAnimationTime = now;

	  if (execute_count > 0) {
	    // Animation in progress
	    animateMovements();
	  }
	  else if (!pollInProgress) {
	    // No animation, check for movements and maybe request more simulation
	    pollInProgress = true;
	    pollMovements().then(result => {
	      pollInProgress = false;

	      handlePolledMovementResult(result);

	      // Auto-request more simulation only when autosim is OFF (else the backend
	      // producer fills the buffer ahead of the display; we just consume it).
	      if (!autosimEnabled && simulationActive && !isSimulating && !backendBusy && queuedMovements <= TARGET_BUFFER) {
	        requestSimulation(BATCH_SIZE);
	      }
	    });
	  }
	}

	function isMenuOpen() {
	  const menu = document.getElementById('menu-overlay');
	  return menu && !menu.classList.contains('hidden');
	}

	function updateButtonStates() {
		const playBtn = document.getElementById("play_button");
		const pauseBtn = document.getElementById("pause_button");
		const skipBtn = document.getElementById("skip_button");

		// Remove active class from all
		playBtn.classList.remove('active');
		pauseBtn.classList.remove('active');

		if (isSkipping) {
			playBtn.disabled = true;
			pauseBtn.disabled = false;
			skipBtn.disabled = true;
			skipBtn.querySelector('.icon').textContent = '⏳';
		} else if (isPaused) {
			playBtn.disabled = false;
			pauseBtn.disabled = true;
			skipBtn.disabled = false;
			skipBtn.querySelector('.icon').textContent = '⏭';
			pauseBtn.classList.add('active');
		} else {
			playBtn.disabled = false;
			pauseBtn.disabled = false;
			skipBtn.disabled = false;
			skipBtn.querySelector('.icon').textContent = '⏭';
			playBtn.classList.add('active');
		}
	}

	document.getElementById("play_button").addEventListener("click", function() {
		simulationActive = true;
		isPaused = false;
		isSkipping = false;
		// User gesture: the right moment to ask for approval notifications.
		ensureNotificationPermission();
		setPlaybackState('playing');
		if (firstPlayThisLoad) {
			firstPlayThisLoad = false;
			const personaCount = Object.keys(persona_names).length;
			updateSimStatus(
				`First step calls Claude for ${personaCount} personas (~60-120s)`, true);

			updateSimStatus('Starting playback...', true);

		document.querySelectorAll('.chat-bubble.new').forEach(bubble => {
			bubble.classList.add('fading');
			setTimeout(() => {

	// Spacebar hotkey: toggle skip mode / pause
	document.addEventListener("keydown", function(e) {
		// Ignore if typing in a text input field (but allow range sliders)
		if (e.target.tagName === 'TEXTAREA') return;
		if (e.target.tagName === 'INPUT' && e.target.type !== 'range') return;
		// Ignore if menu is open
		if (isMenuOpen()) return;

		if (e.code === "Space") {
			// Don't hijack Space while typing (reviewer note, delivery form...).
			const tag = (document.activeElement?.tagName || '').toLowerCase();
			if (tag === 'input' || tag === 'textarea' || tag === 'select') return;
			e.preventDefault();  // Prevent page scroll and slider interaction
			if (document.activeElement) document.activeElement.blur();

			if (isSkipping || !isPaused) {
				// Currently running (skipping or playing) - pause
				isPaused = true;
				isSkipping = false;
				setPlaybackState('paused');
				updateButtonStates();
			} else if (e.shiftKey) {
				// Paused + Shift-Space = skip to next action (the old Space).
				startSkipMode();
			} else {
				// Paused + Space = PLAY (what everyone expects).
				document.getElementById("play_button").click();
			}
		}

	// ==========================================================================
	// Chat Popup System
	// ==========================================================================

	// Track conversations by group
	let conversations = {};  // {convoId: {participants: Set, lines: [], location: {x, y}}}
	let activeConvoId = null;
	let lastConvoActivity = 0;  // For fade-out timer
	let chatMinimized = false;
	let displayedMessageKeys = new Set();  // Track which messages are already displayed
	let previousConvoIds = [];  // Track previous conversation tabs for highlighting

	function updateChatPopup(movements) {
		const chatPopup = document.getElementById('chat-popup');
		if (!chatPopup || !movements || !movements.persona) return;

		// Use backend's authoritative conversation groups if available
		const backendConvos = movements.meta?.conversations || {};

		// Collect all unique chat lines from all personas
		// Key is "speaker:line", value is {speaker, line, location}
		let allLines = new Map();
		let firstLocation = null;

		for (const [name, data] of Object.entries(movements.persona)) {
			if (data.chat && data.chat.length > 0) {
				if (!firstLocation) {
					firstLocation = { x: data.movement[0], y: data.movement[1] };
				}
				for (const [speaker, line] of data.chat) {
					const key = `${speaker}:${line}`;
					if (!allLines.has(key)) {
						allLines.set(key, {
							speaker,
							line,
							key,
							location: { x: data.movement[0], y: data.movement[1] }
						});
					}
				}
			}
		}

		// Build conversation objects using backend's participant list
		let activeConvos = {};
		for (const [groupId, groupInfo] of Object.entries(backendConvos)) {
			if (groupInfo.participants && groupInfo.participants.length > 0) {
				activeConvos[groupId] = {
					participants: new Set(groupInfo.participants),
					lines: [...allLines.values()],
					location: firstLocation || { x: 0, y: 0 }
				};
			}
		}

		// Fallback: if no backend convos but we have chat lines, derive from speakers
		if (Object.keys(activeConvos).length === 0 && allLines.size > 0) {
			const speakers = new Set([...allLines.values()].map(l => l.speaker));
			const convoId = [...speakers].sort().join('_');
			activeConvos[convoId] = {
				participants: speakers,
				lines: [...allLines.values()],
				location: firstLocation
			};
		}

		// Update stored conversations
		conversations = activeConvos;
		const convoIds = Object.keys(conversations);

		if (convoIds.length === 0) {
			// Start fade timer if no activity
			if (Date.now() - lastConvoActivity > 5000) {
				chatPopup.classList.add('hidden');
				// Clear displayed messages when chat hides (for fresh start next time)
				displayedMessageKeys.clear();
				previousConvoIds = [];
			}
			return;
		}

		lastConvoActivity = Date.now();
		chatPopup.classList.remove('hidden');

		// Auto-select closest conversation to camera if none selected or current is gone
		if (!activeConvoId || !conversations[activeConvoId]) {
			activeConvoId = findClosestConversation();
		}

		// Update tabs
		updateConversationTabs(convoIds);

		// Update messages for active conversation (if not minimized)
		if (!chatMinimized) {
			updateConversationMessages(activeConvoId);
		}
	}

	function findClosestConversation() {
		if (!mainCamera) return Object.keys(conversations)[0] || null;

		// Get camera center position
		const camX = mainCamera.scrollX + mainCamera.width / 2;
		const camY = mainCamera.scrollY + mainCamera.height / 2;

		let closest = null;
		let minDist = Infinity;

		for (const [convoId, convo] of Object.entries(conversations)) {
			const dx = convo.location.x * tile_width - camX;
			const dy = convo.location.y * tile_width - camY;
			const dist = dx * dx + dy * dy;
			if (dist < minDist) {
				minDist = dist;
				closest = convoId;
			}
		}
		return closest;
	}

	function getInitials(name) {
		// Extract initials from a name (e.g., "Maria Lopez" -> "ML")
		const rgx = new RegExp(/(\p{L}{1})\p{L}+/, 'gu');
		const matches = [...name.matchAll(rgx)] || [];
		return ((matches.shift()?.[1] || '') + (matches.pop()?.[1] || '')).toUpperCase();
	}

	function updateConversationTabs(convoIds) {
		const chatTabs = document.getElementById('chat-tabs');
		if (!chatTabs) return;

		// Check for new conversations (not in previous list)
		const newConvoIds = convoIds.filter(id => !previousConvoIds.includes(id));

		// Only rebuild tabs if the list changed
		const tabsChanged = convoIds.length !== previousConvoIds.length ||
			convoIds.some((id, i) => id !== previousConvoIds[i]);

		if (tabsChanged) {
			chatTabs.innerHTML = '';

			for (const convoId of convoIds) {
				const convo = conversations[convoId];
				const tab = document.createElement('button');
				const isNew = newConvoIds.includes(convoId);
				tab.className = 'chat-tab' + (convoId === activeConvoId ? ' active' : '') + (isNew ? ' new' : '');
				tab.dataset.convoId = convoId;
				// Show initials of first two participants
				const participantInitials = [...convo.participants].slice(0, 2).map(getInitials);
				tab.textContent = participantInitials.join(' & ');
				if (convo.participants.size > 2) {
					tab.textContent += ` +${convo.participants.size - 2}`;
				}
				// Add tooltip with full names
				tab.title = [...convo.participants].join(', ');
				tab.onclick = () => {
					activeConvoId = convoId;
					// Pan camera to conversation location
					if (mainCamera) {
						mainCamera.pan(
							convo.location.x * tile_width,
							convo.location.y * tile_width,
							500, 'Power2'
						);
					}
					updateConversationTabs(convoIds);
					updateConversationMessages(convoId);
				};
				chatTabs.appendChild(tab);

				// Remove 'new' highlight after animation
				if (isNew) {
					setTimeout(() => tab.classList.remove('new'), 1500);
				}
			}
			previousConvoIds = [...convoIds];
		} else {
			// Just update active state without rebuilding
			chatTabs.querySelectorAll('.chat-tab').forEach(tab => {
				const isActive = tab.dataset.convoId === activeConvoId;
				tab.classList.toggle('active', isActive);
			});
		}
	}

	function updateConversationMessages(convoId, forceRebuild = false) {
		const chatMessages = document.getElementById('chat-messages');
		if (!chatMessages) return;

		const convo = conversations[convoId];
		if (!convo) {
			chatMessages.innerHTML = '<p class="chat-empty">No active conversation</p>';
			displayedMessageKeys.clear();
			return;
		}

		// If conversation changed or forced rebuild, clear and rebuild
		const currentConvoMarker = chatMessages.dataset.convoId;
		if (currentConvoMarker !== convoId || forceRebuild) {
			chatMessages.innerHTML = '';
			chatMessages.dataset.convoId = convoId;
			displayedMessageKeys.clear();
		}

		// Add only new messages (those not in displayedMessageKeys)
		let addedNew = false;
		for (const { speaker, line, key } of convo.lines) {
			if (!displayedMessageKeys.has(key)) {
				displayedMessageKeys.add(key);

				const bubble = document.createElement('div');
				// Only highlight as "new" if simulation is paused (skip ahead was used)
				// When playing, messages flow naturally so no highlight needed
				bubble.className = isPaused ? 'chat-bubble new' : 'chat-bubble';
				bubble.innerHTML = `
					<span class="speaker">${escapeHtml(speaker)}</span>
					<span class="message">${escapeHtml(line)}</span>
				`;
				chatMessages.appendChild(bubble);
				addedNew = true;
				// Mirror every line into the persistent event feed — the popup
				// auto-wipes after 5s of silence; the feed is the record.
				if (window.feedChatLine) window.feedChatLine(speaker, line);

				// If paused, keep highlight until playback resumes
				// If playing, fade out after animation completes
				if (!isPaused) {
					// No highlight when playing - messages flow naturally
				}
				// Note: 'new' class removal when unpausing is handled in play button handler
			}
		}

		// Only scroll if new messages were added
		if (addedNew) {
			chatMessages.scrollTop = chatMessages.scrollHeight;
		}
	}

	// Chat minimize button
	document.getElementById('chat-minimize').addEventListener('click', function() {
		const chatPopup = document.getElementById('chat-popup');
		chatMinimized = !chatMinimized;
		if (chatMinimized) {
			chatPopup.classList.add('minimized');
			this.textContent = '+';
		} else {
			chatPopup.classList.remove('minimized');
			this.textContent = '−';
			// Refresh messages when expanding
			if (activeConvoId) {
				updateConversationMessages(activeConvoId);
			}
		}
	});

	// ==========================================================================
	// Menu System (ESC key)
	// ==========================================================================

	function toggleMenu() {
		const menu = document.getElementById('menu-overlay');
		if (menu.classList.contains('hidden')) {
			openMenu();
		} else {
			closeMenu();
		}
	}

	function openMenu() {
		const menu = document.getElementById('menu-overlay');
		menu.classList.remove('hidden');

		// Update current sim info
		document.getElementById('menu-sim-info').textContent =
			`${sim_code} - Step ${displayedStep}`;

		// Load saves list
		loadSavesList();
	}

	function closeMenu() {
		const menu = document.getElementById('menu-overlay');
		menu.classList.add('hidden');
	}

	async function loadSavesList() {
		const savesList = document.getElementById('saves-list');
		savesList.innerHTML = '<p class="saves-loading">Loading...</p>';

		try {
			const response = await fetch("{% url 'api_saves' %}");
			const result = await response.json();

			if (result.saves && result.saves.length > 0) {
				savesList.innerHTML = result.saves.map(save => `
					<div class="save-item ${save.sim_code === sim_code ? 'current' : ''}"
						 data-sim-code="${escapeHtml(save.sim_code)}">
						<div>
							<div class="save-name">${escapeHtml(save.sim_code)}</div>
							<div class="save-info">Step ${escapeHtml(save.step)} - ${escapeHtml(save.personas.length)} personas</div>
						</div>
						<div class="save-info">${escapeHtml(save.curr_time)}</div>
					</div>
				`).join('');

				// Non-current saves aren't loadable from the browser — say so
				// inline instead of ambushing with an alert().
				savesList.querySelectorAll('.save-item').forEach(item => {
					const saveCode = item.getAttribute('data-sim-code');
					if (saveCode !== sim_code) {
						item.classList.add('disabled');
						item.title = 'Restart the backend with this save to load it';
					}
				});
			} else {
				savesList.innerHTML = '<p class="saves-loading">No saves found</p>';
			}
		} catch (error) {
			savesList.innerHTML = '<p class="saves-loading">Failed to load saves</p>';
		}
	}

	async function saveGame() {
		const saveBtn = document.getElementById('menu-save-btn');
		saveBtn.disabled = true;
		saveBtn.textContent = 'Saving...';

		try {
			const response = await fetch("{% url 'api_save' %}", {
				method: 'POST',
				headers: { 'X-CSRFToken': getCookie('csrftoken') }
			});
			const result = await response.json();

			if (result.status === 'saved') {
				saveBtn.textContent = 'Saved!';
				setTimeout(() => {
					saveBtn.textContent = 'Save Game';
					saveBtn.disabled = false;
				}, 2000);
				// Refresh saves list
				loadSavesList();
			} else {
				saveBtn.textContent = 'Save Failed';
				saveBtn.disabled = false;
			}
		} catch (error) {
			saveBtn.textContent = 'Save Failed';
			saveBtn.disabled = false;
		}
	}

	// ESC key handler
	document.addEventListener('keydown', function(e) {
		if (e.key === 'Escape') {
			toggleMenu();
		}
	});

	// Menu button handlers
	document.getElementById('menu-save-btn').addEventListener('click', saveGame);
	document.getElementById('menu-resume-btn').addEventListener('click', closeMenu);

	// Click outside menu to close
	document.getElementById('menu-overlay').addEventListener('click', function(e) {
		if (e.target === this) {
			closeMenu();
		}
	});

	// The simulation starts only after Play is pressed.
</script>

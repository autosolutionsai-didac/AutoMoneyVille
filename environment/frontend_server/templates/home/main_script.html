{% load static %}

<div id="step" style="display:none">{{step}}</div>
<div id="sim_code" style="display:none">{{sim_code}}</div>
<div id="persona_name_list" style="display:none">{{persona_name_str}}</div>
<div id="persona_init_pos" style="display:none">
	{% for i in persona_init_pos %}
		<span>{{i.0}},{{i.1}},{{i.2}}</span>
	{% endfor %}
</div>

<script type="text/javascript">
	// ###########################################################################
	// PREAMBLE
	// ###########################################################################

	let step = parseInt(document.getElementById('step').innerHTML);
	let sim_code = document.getElementById('sim_code').innerHTML;

	let spans = document.getElementById('persona_init_pos').getElementsByTagName('span');
	let persona_names = {};
	for(var i = 0, l = spans.length; i < l; i++){
		let x = spans[i].innerText.split(",");
		persona_names[x[0]] = [parseInt(x[1]), parseInt(x[2])]
	}

	// Phaser 3.0 global settings - FULL SCREEN RESPONSIVE
	const config = {
	  type: Phaser.AUTO,
	  width: window.innerWidth,
	  height: window.innerHeight,
	  parent: "game-container",
	  pixelArt: true,
	  scale: {
	    mode: Phaser.Scale.RESIZE,
	    autoCenter: Phaser.Scale.CENTER_BOTH
	  },
	  physics: {
	    default: "arcade",
	    arcade: {
	      gravity: { y: 0 }
	    }
	  },
	  scene: {
	    preload: preload,
	    create: create,
	    update: update
	  }
	};

	const game = new Phaser.Game(config);
	let showDebug = false;

	// Camera control state
	let isDragging = false;
	let dragStart = { x: 0, y: 0 };
	let scrollStart = { x: 0, y: 0 };
	let zoomLevel = 1.0;
	const zoomMin = 0.3;
	const zoomMax = 3.0;
	const zoomStep = 0.1;
	let mainCamera = null;
	let mapBounds = { width: 0, height: 0 };

	// Day/night cycle
	let nightOverlay = null;

	function parseTimeString(timeStr) {
		// Parse time like "February 13, 2024, 07:00:00" or "07:00 AM"
		// Returns {hour, minute} in 24-hour format
		const match = timeStr.match(/(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(AM|PM)?/i);
		if (!match) return { hour: 12, minute: 0 };  // Default to noon if can't parse

		let hour = parseInt(match[1]);
		const minute = parseInt(match[2]);
		const ampm = match[4];

		if (ampm) {
			// 12-hour format
			if (ampm.toUpperCase() === 'PM' && hour !== 12) hour += 12;
			if (ampm.toUpperCase() === 'AM' && hour === 12) hour = 0;
		}
		// If no AM/PM, assume 24-hour format

		return { hour, minute };
	}

	function calculateNightOpacity(hour, minute = 0) {
		// Returns opacity 0-0.6 based on time of day with smooth 1-hour transitions
		// Full day (no overlay): 7am - 6pm
		// Transition (dawn): 6am - 7am (smooth fade)
		// Transition (dusk): 6pm - 7pm (smooth fade)
		// Full night: 7pm - 6am

		const maxNight = 0.6;  // Maximum darkness at night
		const hourFloat = hour + minute / 60;  // Include minutes for smooth transitions

		if (hourFloat >= 7 && hourFloat < 18) {
			// Daytime: no overlay
			return 0;
		} else if (hourFloat >= 6 && hourFloat < 7) {
			// Dawn: fade from maxNight to 0 over 1 hour
			return maxNight * (1 - (hourFloat - 6));
		} else if (hourFloat >= 18 && hourFloat < 19) {
			// Dusk: fade from 0 to maxNight over 1 hour
			return maxNight * (hourFloat - 18);
		} else {
			// Night: full darkness
			return maxNight;
		}
	}

	function updateDayNightCycle(timeStr) {
		if (!nightOverlay) return;

		const { hour, minute } = parseTimeString(timeStr);
		const targetOpacity = calculateNightOpacity(hour, minute);
		nightOverlay.setAlpha(targetOpacity);
	}

	// Persona related variables
	var spawn_tile_loc = {};
	for (var key in persona_names){
		spawn_tile_loc[key] = persona_names[key];
	}

	var personas = {};
	var pronunciatios = {};
	let anims_direction;
	let pre_anims_direction_dict = {};

	// Persona activity tracking for dynamic panel ordering
	let personaLastActivity = {};  // { personaName: timestamp }

	function updatePersonaActivity(personaNames) {
		// Update activity timestamp for active personas
		const now = Date.now();
		for (const name of personaNames) {
			personaLastActivity[name] = now;
		}
		reorderPersonaPanel();
	}

	function reorderPersonaPanel() {
		const panelContent = document.querySelector('#persona-panel .panel-content');
		if (!panelContent) return;

		const cards = Array.from(panelContent.querySelectorAll('.persona-card'));
		if (cards.length === 0) return;

		// Sort cards by last activity (most recent first), then alphabetically for ties
		cards.sort((a, b) => {
			const nameA = a.getAttribute('data-persona-name');
			const nameB = b.getAttribute('data-persona-name');
			const activityA = personaLastActivity[nameA] || 0;
			const activityB = personaLastActivity[nameB] || 0;

			if (activityB !== activityA) {
				return activityB - activityA;  // Most recent first
			}
			return nameA.localeCompare(nameB);  // Alphabetical fallback
		});

		// Reorder DOM elements
		for (const card of cards) {
			panelContent.appendChild(card);
		}
	}

	let curr_maze = "the_ville";
	let tile_width = 32;
	let movement_speed = 4;

	// Movement display variables
	let pollInProgress = false;
	let execute_movement = null;
	let execute_count_max = tile_width/movement_speed;
	let execute_count = 0;
	let movement_target = {};
	let autoFollowMovement = true;
	let lastMovementPacketAt = Date.now();

	// ==========================================================================
	// Playback Controls
	// ==========================================================================
	let isPaused = true;
	let isSkipping = false;
	let playbackSpeed = 5;
	let animationDelay = 200;
	let lastAnimationTime = 0;
	let playbackState = "paused";
	let latestBackendHealth = null;
	let backendBusy = false;
	let selectedTownCenterRequestId = null;
	let staleRunReloadScheduled = false;

	// ==========================================================================
	// Simulation Control (Frontend-driven)
	// ==========================================================================
	let isSimulating = false;
	let simulationActive = false; // Master switch for auto-simulation
	let queuedMovements = 0;      // Steps queued but not yet animated
	let displayedStep = step;     // Step currently being displayed
	let simulatedStep = step;     // Step simulated on backend
	let lastAppliedMovementStep = step - 1;
	const CLIENT_VERSION = "stream-v2";
	const TARGET_BUFFER = 1;      // Keep playback responsive; one slow LLM step should not block a batch
	const BATCH_SIZE = 1;         // Request one backend step per batch

	function setPlaybackState(state) {
		playbackState = state;
		const stateEl = document.getElementById('playback-state-content');
		if (stateEl) stateEl.textContent = state;
	}

	function setDisplayedSimTime(currTime) {
		if (!currTime) return;
		const gameTime = document.getElementById('game-time-content');
		if (gameTime) {
			gameTime.textContent = currTime;
			updateDayNightCycle(currTime);
		}
	}

	function updatePersonaCardFromSnapshot(persona) {
		const personaName = persona?.name;
		if (!personaName) return;
		const personaNameOs = personaName.replace(/ /g, "_");
		const actionEl = document.getElementById("current_action__" + personaNameOs);
		const locationEl = document.getElementById("target_address__" + personaNameOs);
		if (actionEl && persona.action) actionEl.textContent = persona.action;
		if (locationEl && persona.location) locationEl.textContent = persona.location;
	}

	function syncBackendSnapshot(backend) {
		if (!backend?.ok) return;
		if (backend.curr_time && (isPaused || execute_count <= 0)) {
			setDisplayedSimTime(backend.curr_time);
		}
		for (const persona of backend.personas || []) {
			updatePersonaCardFromSnapshot(persona);
		}
	}

	function updateRuntimePanel(health) {
		const panel = document.getElementById('runtime-status-panel');
		const backend = health?.backend || {};
		latestBackendHealth = backend;
		backendBusy = Boolean(backend.backend_busy);
		if (
			backend.ok &&
			backend.sim_code &&
			backend.sim_code !== sim_code &&
			!staleRunReloadScheduled
		) {
			staleRunReloadScheduled = true;
			updateSimStatus('New backend run detected - reloading page', true);
			setTimeout(() => window.location.reload(), 750);
		}

		const backendHealth = document.getElementById('backend-health-content');
		const backendTime = document.getElementById('backend-time-content');
		const backendStep = document.getElementById('backend-step-content');
		const queueDepth = document.getElementById('queue-depth-content');
		const backendBusyEl = document.getElementById('backend-busy-content');

		if (backendHealth) {
			backendHealth.textContent = backend.ok ? (backend.backend_busy ? 'busy' : 'online') : 'offline';
		}
		if (backendTime) backendTime.textContent = backend.curr_time || '--';
		const gameTime = document.getElementById('game-time-content');
		if (gameTime && gameTime.textContent === '--:--' && backend.curr_time) {
			gameTime.textContent = backend.curr_time;
			updateDayNightCycle(backend.curr_time);
		}
		syncBackendSnapshot(backend);
		if (backendStep) backendStep.textContent = backend.step ?? '--';
		if (queueDepth) queueDepth.textContent = backend.movement_queue_depth ?? queuedMovements ?? '--';
		if (backendBusyEl) {
			if (!backend.ok) {
				backendBusyEl.textContent = backend.error || 'unavailable';
			} else if (backend.backend_busy) {
				const seconds = backend.backend_busy_seconds ?? 0;
				const reason = backend.backend_busy_reason || 'working';
				backendBusyEl.textContent = `${reason} (${seconds}s)`;
				backendBusyEl.title = backend.backend_busy_since || '';
			} else {
				backendBusyEl.textContent = 'idle';
				backendBusyEl.title = '';
			}
		}
		if (panel) panel.classList.toggle('backend-down', !backend.ok);
	}

	async function refreshRuntimeHealth() {
		try {
			const response = await fetch("{% url 'api_health' %}");
			const health = await response.json();
			updateRuntimePanel(health);
			if (isPaused && !isSkipping) {
				setPlaybackState('paused');
			} else if (!health.backend?.ok) {
				updateSimStatus('Backend offline', false);
			} else if (health.backend?.backend_busy) {
				setPlaybackState('backend busy');
				updateSimStatus('Backend busy - waiting for next movement', true);
			} else if (!isPaused && !isSkipping && !isSimulating && playbackState === 'backend busy') {
				setPlaybackState('playing');
				updateSimStatus('Ready', false);
			}
		} catch (error) {
			updateRuntimePanel({ backend: { ok: false, error: String(error) } });
			updateSimStatus('Health check failed', false);
		}
	}

	function formatRevenue(cents) {
		return `$${((cents || 0) / 100).toFixed(2)}`;
	}

	function setTownApprovalButtonsEnabled(enabled) {
		for (const id of [
			'town-approve-request',
			'town-reject-request',
			'town-complete-request',
			'town-fail-request'
		]) {
			const button = document.getElementById(id);
			if (button) button.disabled = !enabled;
		}
	}

	function updateTownCenterPanel(snapshot) {
		const objective = document.getElementById('town-center-objective');
		const points = document.getElementById('town-points-content');
		const revenue = document.getElementById('town-revenue-content');
		const requests = document.getElementById('town-requests-content');
		const approvals = document.getElementById('town-approvals-content');
		const latest = document.getElementById('town-latest-request');
		const approvalTitle = document.getElementById('town-approval-title');
		const approvalMeta = document.getElementById('town-approval-meta');

		const score = snapshot?.team_score || {};
		const requestList = snapshot?.requests || [];
		const approvalQueue = snapshot?.approval_queue || [];
		const latestRequest = requestList[requestList.length - 1];
		const activeApproval = approvalQueue[0] || null;

		if (objective) objective.textContent = snapshot?.scenario?.objective || 'Scenario unavailable';
		if (points) points.textContent = score.points ?? 0;
		if (revenue) revenue.textContent = formatRevenue(score.revenue_cents);
		if (requests) requests.textContent = requestList.length;
		if (approvals) approvals.textContent = snapshot?.pending_approval_count ?? 0;
		selectedTownCenterRequestId = activeApproval?.id || null;
		if (approvalTitle) {
			approvalTitle.textContent = activeApproval
				? activeApproval.title
				: 'No pending approvals';
			approvalTitle.title = approvalTitle.textContent;
		}
		if (approvalMeta) {
			approvalMeta.textContent = activeApproval
				? `${activeApproval.actor || 'unknown'} - ${activeApproval.type || 'request'}`
				: '--';
			approvalMeta.title = approvalMeta.textContent;
		}
		setTownApprovalButtonsEnabled(Boolean(activeApproval));
		if (latest) {
			latest.textContent = latestRequest
				? `${latestRequest.current_state}: ${latestRequest.title}`
				: 'No requests yet';
			latest.title = latest.textContent;
		}
	}

	async function refreshTownCenter() {
		try {
			const response = await fetch("{% url 'api_town_center' %}");
			const snapshot = await response.json();
			if (snapshot.error) {
				updateTownCenterPanel({ scenario: { objective: 'Town center unavailable' } });
				return;
			}
			updateTownCenterPanel(snapshot);
		} catch (error) {
			updateTownCenterPanel({ scenario: { objective: 'Town center unavailable' } });
		}
	}

	async function transitionTownCenterRequest(state) {
		if (!selectedTownCenterRequestId) return;
		setTownApprovalButtonsEnabled(false);
		const transitionUrl = "{% url 'api_town_center_request_transition' 'REQUEST_ID' %}"
			.replace('REQUEST_ID', encodeURIComponent(selectedTownCenterRequestId));
		try {
			await fetch(transitionUrl, {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({
					state: state,
					reviewer: 'human',
					note: `${state} from simulator town center`
				})
			});
		} catch (error) {
			console.error('[TOWN] Transition failed:', error);
		}
		await refreshTownCenter();
	}

	async function requestSimulation(numSteps, forceRequest = false) {
		if (isSimulating || (backendBusy && !forceRequest)) return;
		isSimulating = true;
		setPlaybackState('simulating');
		updateSimStatus('Simulating...', true);

		try {
			const response = await fetch("{% url 'api_simulate' %}", {
				method: 'POST',
				headers: {
					'Content-Type': 'application/json',
					'X-Claudeville-Client': CLIENT_VERSION
				},
				body: JSON.stringify({ steps: numSteps })
			});
			const result = await response.json();
			if (response.status === 504) {
				backendBusy = true;
				setPlaybackState('backend busy');
				updateSimStatus('Backend timeout - waiting for completion', true);
			} else if (result.status === 'ok') {
				backendBusy = false;
				simulatedStep = result.current_step;
				queuedMovements = result.queued_movements;
			} else if (result.status === 'busy') {
				backendBusy = true;
				queuedMovements = result.queued_movements ?? queuedMovements;
				setPlaybackState('backend busy');
				updateSimStatus('Backend busy - waiting for next movement', true);
			} else if (result.error) {
				console.error('[SIM] Backend error:', result.error);
				handleSimulationError(result.error);
			}
		} catch (error) {
			console.error('[SIM] Request failed:', error);
			handleSimulationError(String(error));
		}

		isSimulating = false;
		if (isPaused && !isSkipping) {
			setPlaybackState('paused');
		} else if (backendBusy) {
			setPlaybackState('backend busy');
		} else if (!isPaused && !isSkipping && playbackState !== 'backend busy') {
			setPlaybackState('playing');
		}
		if (simulationActive && !backendBusy) {
			updateSimStatus('Ready', false);
		}
		refreshRuntimeHealth();
	}

	function handlePolledMovementResult(result) {
		if (!result.hasMovements) return false;

		queuedMovements = Math.max(0, queuedMovements - 1);

		if (result.hadNewAction) {
			const activePersonas = result.movement.meta?.active_personas || [];
			if (activePersonas.length > 0) {
				updatePersonaActivity(activePersonas);
			}
		}

		if (isSkipping && result.hadNewAction) {
			handleSkipActionFound(result.movement);
		}

		return true;
	}

	async function kickPlaybackPipeline(forceRequest = false) {
		if (!simulationActive || isPaused || isSkipping || isMenuOpen()) return;
		if (execute_count > 0 || pollInProgress) return;

		pollInProgress = true;
		const result = await pollMovements();
		pollInProgress = false;

		if (handlePolledMovementResult(result)) return;

		if (simulationActive && !isSimulating && queuedMovements <= TARGET_BUFFER) {
			requestSimulation(BATCH_SIZE, forceRequest);
		}
	}

	function handleSimulationError(message) {
		simulationActive = false;
		isPaused = true;
		isSkipping = false;
		setPlaybackState('paused');
		updateButtonStates();
		updateSimStatus('Simulation error - check backend status', false);
		console.error('[SIM] Auto-simulation paused:', message);
	}

	function updateSimStatus(text, simulating) {
		const statusEl = document.getElementById('sim-status');
		const textEl = document.getElementById('sim-status-text');
		if (textEl) textEl.textContent = text;
		if (statusEl) {
			if (simulating) {
				statusEl.classList.add('simulating');
			} else {
				statusEl.classList.remove('simulating');
			}
		}
	}

	function calculateMovementFrameCount(movement) {
		let maxDistance = tile_width;
		for (const [personaName, movementData] of Object.entries(movement?.persona || {})) {
			const sprite = personas[personaName];
			const targetTile = movementData?.movement;
			if (!sprite || !targetTile || targetTile.length < 2) continue;
			const targetX = targetTile[0] * tile_width;
			const targetY = targetTile[1] * tile_width;
			const distance = Math.abs(sprite.body.x - targetX) + Math.abs(sprite.body.y - targetY);
			maxDistance = Math.max(maxDistance, distance);
		}
		return Math.max(tile_width / movement_speed, Math.ceil(maxDistance / movement_speed));
	}

	function focusMovementTarget(movement) {
		if (!autoFollowMovement || !mainCamera || isDragging) return;

		const personaEntries = Object.entries(movement?.persona || {});
		const activeNames = movement?.meta?.active_personas || [];
		const preferredEntries = [
			...activeNames
				.map(name => [name, movement.persona?.[name]])
				.filter(([, data]) => data),
			...personaEntries
		];

		for (const [personaName, movementData] of preferredEntries) {
			const sprite = personas[personaName];
			const targetTile = movementData?.movement;
			if (!sprite || !targetTile || targetTile.length < 2) continue;

			const targetX = targetTile[0] * tile_width;
			const targetY = targetTile[1] * tile_width;
			const isMoving = Math.abs(sprite.body.x - targetX) > 1 || Math.abs(sprite.body.y - targetY) > 1;
			const isActive = activeNames.includes(personaName);
			if (isMoving || isActive) {
				mainCamera.pan(targetX, targetY, 450, 'Power2');
				return;
			}
		}
	}

	// ==========================================================================
	// Movement Polling
	// ==========================================================================

	async function pollMovements() {
		try {
			const movementsUrl = `{% url 'api_movements' %}?after_step=${lastAppliedMovementStep}`;
			const response = await fetch(movementsUrl, {
				headers: { 'X-Claudeville-Client': CLIENT_VERSION }
			});
			const result = await response.json();

			if (result.empty) {
				queuedMovements = 0;  // Backend queue is empty, reset our count
				if (!isPaused && !isSimulating) {
					setPlaybackState(backendBusy ? 'backend busy' : 'buffering');
				}
				await new Promise(r => setTimeout(r, 500));
				return { hasMovements: false, hadNewAction: false };
			}

			if (result.error) {
				console.error('[POLL] Error:', result.error);
				await new Promise(r => setTimeout(r, 1000));
				return { hasMovements: false, hadNewAction: false };
			}

			const movementStep = result.meta?.step;
			if (typeof movementStep === 'number' && movementStep <= lastAppliedMovementStep) {
				return { hasMovements: false, hadNewAction: false };
			}

			execute_movement = result;
			execute_count_max = calculateMovementFrameCount(result);
			execute_count = execute_count_max;
			lastMovementPacketAt = Date.now();
			focusMovementTarget(result);
			if (!isPaused && !isSkipping) setPlaybackState('playing');
			const hadNewAction = result.meta && result.meta.had_new_action;
			return { hasMovements: true, hadNewAction: hadNewAction, movement: result };

		} catch (error) {
			console.error('[POLL] Request failed:', error);
			await new Promise(r => setTimeout(r, 1000));
			return { hasMovements: false, hadNewAction: false };
		}
	}

	// Skip mode just sets a flag - the update() loop handles the rest
	// When skipping: runs at max speed, auto-pauses when LLM action detected
	function startSkipMode() {
		isSkipping = true;
		isPaused = false;  // Unpause to let update() run
		setPlaybackState('skipping');
		updateButtonStates();
		updateSimStatus('Skipping to next action...', false);
	}

	// Called when we detect an LLM action during skip mode
	function handleSkipActionFound(movement) {
		if (!isSkipping) return;

		const activePersonas = movement.meta?.active_personas || [];
		if (activePersonas.length > 0) {
			// Center on the first active persona
			const personaName = activePersonas[0];
			const personaData = movement.persona[personaName];
			if (personaData && mainCamera) {
				const targetX = personaData.movement[0] * tile_width;
				const targetY = personaData.movement[1] * tile_width;
				mainCamera.pan(targetX, targetY, 300, 'Power2');
				console.log('[SKIP] Centering on active persona:', personaName);
			}
		}

		// Stop skipping and pause
		isSkipping = false;
		isPaused = true;
		setPlaybackState('paused');
		updateButtonStates();
		updateSimStatus('Ready', false);
	}

	function getAnimationDelay() {
		// Use selected speed for both normal and skip mode
		// Scale delay: speed 1 = 400ms, speed 50 = 10ms
		return Math.max(10, Math.floor(400 / playbackSpeed));
	}

	function animateMovements() {
		if (!execute_movement || execute_count <= 0) {
			return true;
		}

		const currTime = execute_movement["meta"]["curr_time"];
		document.getElementById("game-time-content").innerHTML = currTime;
		updateDayNightCycle(currTime);
		if (execute_count == execute_count_max) {
			updateChatPopup(execute_movement);
		}

		for (let i = 0; i < Object.keys(personas).length; i++) {
			let curr_persona_name = Object.keys(personas)[i];
			let curr_persona = personas[curr_persona_name];
			let curr_pronunciatio = pronunciatios[curr_persona_name];
			const movementData = execute_movement?.["persona"]?.[curr_persona_name];
			if (!movementData) {
				movement_target[curr_persona_name] = [curr_persona.body.x, curr_persona.body.y];
				continue;
			}

			if (execute_count == execute_count_max) {
				let curr_x = movementData["movement"][0];
				let curr_y = movementData["movement"][1];
				movement_target[curr_persona_name] = [curr_x * tile_width, curr_y * tile_width];

				let pronunciatio_content = movementData["pronunciatio"];
				pronunciatios[curr_persona_name].setText(pronunciatio_content);

				let curr_persona_name_os = curr_persona_name.replace(/ /g, "_");
				let description_content = movementData["description"] || "";

				document.getElementById("current_action__" + curr_persona_name_os).innerHTML = description_content.split("@")[0];
				document.getElementById("target_address__" + curr_persona_name_os).innerHTML = description_content.split("@")[1];
			}

			if (curr_persona.body.x < movement_target[curr_persona_name][0]) {
				curr_persona.body.x += movement_speed;
				anims_direction = "r";
				pre_anims_direction_dict[curr_persona_name] = "r";
			} else if (curr_persona.body.x > movement_target[curr_persona_name][0]) {
				curr_persona.body.x -= movement_speed;
				anims_direction = "l";
				pre_anims_direction_dict[curr_persona_name] = "l";
			} else if (curr_persona.body.y < movement_target[curr_persona_name][1]) {
				curr_persona.body.y += movement_speed;
				anims_direction = "d";
				pre_anims_direction_dict[curr_persona_name] = "d";
			} else if (curr_persona.body.y > movement_target[curr_persona_name][1]) {
				curr_persona.body.y -= movement_speed;
				anims_direction = "u";
				pre_anims_direction_dict[curr_persona_name] = "u";
			} else {
				anims_direction = "";
			}

			curr_pronunciatio.x = curr_persona.body.x + 16;  // Center over sprite (sprite is 32px wide)
			curr_pronunciatio.y = curr_persona.body.y - 42;  // Well above sprite head

			let animKey = curr_persona.spriteKey || "fallback";
			if (anims_direction == "l") {
				curr_persona.anims.play(animKey + "-left-walk", true);
			} else if (anims_direction == "r") {
				curr_persona.anims.play(animKey + "-right-walk", true);
			} else if (anims_direction == "u") {
				curr_persona.anims.play(animKey + "-back-walk", true);
			} else if (anims_direction == "d") {
				curr_persona.anims.play(animKey + "-front-walk", true);
			} else {
				curr_persona.anims.stop();

				// Determine facing direction: face conversation partner if chatting
				let facing_direction = pre_anims_direction_dict[curr_persona_name];
				let chatting_with = movementData?.["chatting_with"];
				if (chatting_with && personas[chatting_with]) {
					let partner = personas[chatting_with];
					let dx = partner.body.x - curr_persona.body.x;
					let dy = partner.body.y - curr_persona.body.y;
					// Face the direction with the larger difference
					if (Math.abs(dx) > Math.abs(dy)) {
						facing_direction = dx > 0 ? "r" : "l";
					} else {
						facing_direction = dy > 0 ? "d" : "u";
					}
				}

				if (curr_persona.spriteKey) {
					if (facing_direction == "l") curr_persona.setFrame(4);
					else if (facing_direction == "r") curr_persona.setFrame(7);
					else if (facing_direction == "u") curr_persona.setFrame(10);
					else if (facing_direction == "d") curr_persona.setFrame(1);
				} else {
					if (facing_direction == "l") curr_persona.setTexture("atlas", "left");
					else if (facing_direction == "r") curr_persona.setTexture("atlas", "right");
					else if (facing_direction == "u") curr_persona.setTexture("atlas", "up");
					else if (facing_direction == "d") curr_persona.setTexture("atlas", "down");
				}
			}
		}

		execute_count--;

		if (execute_count <= 0) {
			for (let persona_name in personas) {
				personas[persona_name].body.x = movement_target[persona_name][0];
				personas[persona_name].body.y = movement_target[persona_name][1];
			}
			const movementStep = execute_movement?.["meta"]?.["step"];
			if (typeof movementStep === 'number') {
				lastAppliedMovementStep = Math.max(lastAppliedMovementStep, movementStep);
				step = lastAppliedMovementStep + 1;
				displayedStep = step;
			}
			execute_movement = null;
			return true;
		}

		return false;
	}

	function update(time, delta) {
	  // Skip if paused or menu open (but NOT if skipping - we want to run fast during skip)
	  if (isPaused || isMenuOpen()) {
	    return;
	  }

	  // Throttle animation speed (getAnimationDelay returns 0 during skip mode)
	  const now = Date.now();
	  if (now - lastAnimationTime < getAnimationDelay()) {
	    return;
	  }
	  lastAnimationTime = now;

	  if (execute_count > 0) {
	    // Animation in progress
	    animateMovements();
	  }
	  else if (!pollInProgress) {
	    // No animation, check for movements and maybe request more simulation
	    pollInProgress = true;
	    pollMovements().then(result => {
	      pollInProgress = false;

	      handlePolledMovementResult(result);

	      // Auto-request more simulation if buffer is low and simulation is active
	      if (simulationActive && !isSimulating && !backendBusy && queuedMovements <= TARGET_BUFFER) {
	        requestSimulation(BATCH_SIZE);
	      }
	    });
	  }
	}

	function isMenuOpen() {
	  const menu = document.getElementById('menu-overlay');

	function updateButtonStates() {
		const playBtn = document.getElementById("play_button");
		const pauseBtn = document.getElementById("pause_button");
		const skipBtn = document.getElementById("skip_button");

		// Remove active class from all
		playBtn.classList.remove('active');
		pauseBtn.classList.remove('active');

		if (isSkipping) {
			playBtn.disabled = true;
			pauseBtn.disabled = false;
			skipBtn.disabled = true;
			skipBtn.querySelector('.icon').textContent = '⏳';
		} else if (isPaused) {
			playBtn.disabled = false;
			pauseBtn.disabled = true;
			skipBtn.disabled = false;
			skipBtn.querySelector('.icon').textContent = '⏭';
			pauseBtn.classList.add('active');
		} else {
			playBtn.disabled = false;
			pauseBtn.disabled = false;
			skipBtn.disabled = false;
			skipBtn.querySelector('.icon').textContent = '⏭';
			playBtn.classList.add('active');
		}
	}

	document.addEventListener("keydown", function(e) {
		// Ignore if typing in a text input field (but allow range sliders)
		if (e.target.tagName === 'TEXTAREA') return;
		if (e.target.tagName === 'INPUT' && e.target.type !== 'range') return;
		// Ignore if menu is open
		if (isMenuOpen()) return;

		if (e.code === "Space") {
			e.preventDefault();  // Prevent page scroll and slider interaction
			// Blur any focused element so spacebar doesn't affect it
			if (document.activeElement) document.activeElement.blur();

			if (isSkipping || !isPaused) {
				// Currently running (skipping or playing) - pause
				isPaused = true;
				isSkipping = false;
				setPlaybackState('paused');
				updateButtonStates();

	function updateChatPopup(movements) {
		const chatPopup = document.getElementById('chat-popup');
		if (!chatPopup || !movements || !movements.persona) return;

		// Use backend's authoritative conversation groups if available
		const backendConvos = movements.meta?.conversations || {};

		// Collect all unique chat lines from all personas
		// Key is "speaker:line", value is {speaker, line, location}
		let allLines = new Map();

				for (const [speaker, line] of data.chat) {
					const key = `${speaker}:${line}`;
					if (!allLines.has(key)) {
						allLines.set(key, {
							speaker,
							line,
							key,
							location: { x: data.movement[0], y: data.movement[1] }
						});
					}
				}
			}
		}

		// Build conversation objects using backend's participant list
		let activeConvos = {};
		for (const [groupId, groupInfo] of Object.entries(backendConvos)) {
			if (groupInfo.participants && groupInfo.participants.length > 0) {
				activeConvos[groupId] = {
					participants: new Set(groupInfo.participants),
					lines: [...allLines.values()],
					location: firstLocation || { x: 0, y: 0 }
				};
			}
		}

		// Fallback: if no backend convos but we have chat lines, derive from speakers
		if (Object.keys(activeConvos).length === 0 && allLines.size > 0) {
			const speakers = new Set([...allLines.values()].map(l => l.speaker));
			const convoId = [...speakers].sort().join('_');
			activeConvos[convoId] = {
				participants: speakers,
				lines: [...allLines.values()],
				location: firstLocation
			};
		}

		// Update stored conversations
		conversations = activeConvos;
		const convoIds = Object.keys(conversations);

		if (convoIds.length === 0) {
			// Start fade timer if no activity
			if (Date.now() - lastConvoActivity > 5000) {
				chatPopup.classList.add('hidden');
				// Clear displayed messages when chat hides (for fresh start next time)
				displayedMessageKeys.clear();
				previousConvoIds = [];
			}
			return;
		}

		lastConvoActivity = Date.now();
		chatPopup.classList.remove('hidden');

		// Auto-select closest conversation to camera if none selected or current is gone
		if (!activeConvoId || !conversations[activeConvoId]) {
			activeConvoId = findClosestConversation();
		}

		// Update tabs
		updateConversationTabs(convoIds);

		// Update messages for active conversation (if not minimized)
		if (!chatMinimized) {
			updateConversationMessages(activeConvoId);
		}
	}

	function findClosestConversation() {
		if (!mainCamera) return Object.keys(conversations)[0] || null;

		// Get camera center position
		const camX = mainCamera.scrollX + mainCamera.width / 2;
		const camY = mainCamera.scrollY + mainCamera.height / 2;

		let closest = null;
		let minDist = Infinity;

		for (const [convoId, convo] of Object.entries(conversations)) {
			const dx = convo.location.x * tile_width - camX;
			const dy = convo.location.y * tile_width - camY;
			const dist = dx * dx + dy * dy;
			if (dist < minDist) {
				minDist = dist;
				closest = convoId;
			}
		}
		return closest;
	}

	function getInitials(name) {
		// Extract initials from a name (e.g., "Maria Lopez" -> "ML")
		const rgx = new RegExp(/(\p{L}{1})\p{L}+/, 'gu');
		const matches = [...name.matchAll(rgx)] || [];
		return ((matches.shift()?.[1] || '') + (matches.pop()?.[1] || '')).toUpperCase();
	}

	function updateConversationTabs(convoIds) {
		const chatTabs = document.getElementById('chat-tabs');
		if (!chatTabs) return;

		// Check for new conversations (not in previous list)
		const newConvoIds = convoIds.filter(id => !previousConvoIds.includes(id));

		// Only rebuild tabs if the list changed
		const tabsChanged = convoIds.length !== previousConvoIds.length ||
			convoIds.some((id, i) => id !== previousConvoIds[i]);

		if (tabsChanged) {
			chatTabs.innerHTML = '';

			for (const convoId of convoIds) {
				const convo = conversations[convoId];
				const tab = document.createElement('button');
				const isNew = newConvoIds.includes(convoId);
				tab.className = 'chat-tab' + (convoId === activeConvoId ? ' active' : '') + (isNew ? ' new' : '');
				tab.dataset.convoId = convoId;
				// Show initials of first two participants
				const participantInitials = [...convo.participants].slice(0, 2).map(getInitials);
				tab.textContent = participantInitials.join(' & ');
				if (convo.participants.size > 2) {
					tab.textContent += ` +${convo.participants.size - 2}`;
				}
				// Add tooltip with full names
				tab.title = [...convo.participants].join(', ');
				tab.onclick = () => {
					activeConvoId = convoId;
					// Pan camera to conversation location
					if (mainCamera) {
						mainCamera.pan(
							convo.location.x * tile_width,
							convo.location.y * tile_width,
							500, 'Power2'
						);
					}
					updateConversationTabs(convoIds);
					updateConversationMessages(convoId);
				};
				chatTabs.appendChild(tab);

				// Remove 'new' highlight after animation
				if (isNew) {
					setTimeout(() => tab.classList.remove('new'), 1500);
				}
			}
			previousConvoIds = [...convoIds];
		} else {
			// Just update active state without rebuilding
			chatTabs.querySelectorAll('.chat-tab').forEach(tab => {
				const isActive = tab.dataset.convoId === activeConvoId;
				tab.classList.toggle('active', isActive);
			});
		}
	}

	function updateConversationMessages(convoId, forceRebuild = false) {
		const chatMessages = document.getElementById('chat-messages');
		if (!chatMessages) return;

		const convo = conversations[convoId];
		if (!convo) {
			chatMessages.innerHTML = '<p class="chat-empty">No active conversation</p>';
			displayedMessageKeys.clear();
			return;
		}

		// If conversation changed or forced rebuild, clear and rebuild
		const currentConvoMarker = chatMessages.dataset.convoId;
		if (currentConvoMarker !== convoId || forceRebuild) {
			chatMessages.innerHTML = '';
			chatMessages.dataset.convoId = convoId;
			displayedMessageKeys.clear();
		}

		// Add only new messages (those not in displayedMessageKeys)
		let addedNew = false;
		for (const { speaker, line, key } of convo.lines) {
			if (!displayedMessageKeys.has(key)) {
				displayedMessageKeys.add(key);

				const bubble = document.createElement('div');
				// Only highlight as "new" if simulation is paused (skip ahead was used)
				// When playing, messages flow naturally so no highlight needed
				bubble.className = isPaused ? 'chat-bubble new' : 'chat-bubble';
				bubble.innerHTML = `
					<span class="speaker">${speaker}</span>
					<span class="message">${line}</span>
				`;
				chatMessages.appendChild(bubble);
				addedNew = true;

				// If paused, keep highlight until playback resumes
				// If playing, fade out after animation completes
				if (!isPaused) {
					// No highlight when playing - messages flow naturally
				}
				// Note: 'new' class removal when unpausing is handled in play button handler
			}
		}

		// Only scroll if new messages were added
		if (addedNew) {
			chatMessages.scrollTop = chatMessages.scrollHeight;
		}
	}

	// Chat minimize button
	document.getElementById('chat-minimize').addEventListener('click', function() {
		const chatPopup = document.getElementById('chat-popup');
		chatMinimized = !chatMinimized;
		if (chatMinimized) {
			chatPopup.classList.add('minimized');
			this.textContent = '+';
		} else {
			chatPopup.classList.remove('minimized');
			this.textContent = '−';
			// Refresh messages when expanding
			if (activeConvoId) {
				updateConversationMessages(activeConvoId);
			}
		}
	});

	// ==========================================================================
	// Menu System (ESC key)
	// ==========================================================================

	function toggleMenu() {
		const menu = document.getElementById('menu-overlay');
		if (menu.classList.contains('hidden')) {
			openMenu();
		} else {
			closeMenu();
		}
	}

	function openMenu() {
		const menu = document.getElementById('menu-overlay');
		menu.classList.remove('hidden');

		// Update current sim info
		document.getElementById('menu-sim-info').textContent =
			`${sim_code} - Step ${displayedStep}`;

		// Load saves list
		loadSavesList();
	}

	function closeMenu() {
		const menu = document.getElementById('menu-overlay');
		menu.classList.add('hidden');
	}

	async function loadSavesList() {
		const savesList = document.getElementById('saves-list');
		savesList.innerHTML = '<p class="saves-loading">Loading...</p>';

		try {
			const response = await fetch("{% url 'api_saves' %}");
			const result = await response.json();

			if (result.saves && result.saves.length > 0) {
				savesList.innerHTML = result.saves.map(save => `
					<div class="save-item ${save.sim_code === sim_code ? 'current' : ''}"
						 data-sim-code="${save.sim_code}">
						<div>
							<div class="save-name">${save.sim_code}</div>
							<div class="save-info">Step ${save.step} - ${save.personas.length} personas</div>
						</div>
						<div class="save-info">${save.curr_time}</div>
					</div>
				`).join('');

				// Add click handlers
				savesList.querySelectorAll('.save-item').forEach(item => {
					item.addEventListener('click', function() {
						const saveCode = this.getAttribute('data-sim-code');
						if (saveCode !== sim_code) {
							// Would need page reload to load different sim
							alert('Loading different simulations requires restarting the backend with that save.');
						}
					});
				});
			} else {
				savesList.innerHTML = '<p class="saves-loading">No saves found</p>';
			}
		} catch (error) {
			savesList.innerHTML = '<p class="saves-loading">Failed to load saves</p>';
		}
	}

	async function saveGame() {
		const saveBtn = document.getElementById('menu-save-btn');
		saveBtn.disabled = true;
		saveBtn.textContent = 'Saving...';

		try {
			const response = await fetch("{% url 'api_save' %}", { method: 'POST' });
			const result = await response.json();

			if (result.status === 'saved') {
				saveBtn.textContent = 'Saved!';
				setTimeout(() => {
					saveBtn.textContent = 'Save Game';
					saveBtn.disabled = false;
				}, 2000);
				// Refresh saves list
				loadSavesList();
			} else {
				saveBtn.textContent = 'Save Failed';
				saveBtn.disabled = false;
			}
		} catch (error) {
			saveBtn.textContent = 'Save Failed';
			saveBtn.disabled = false;
		}
	}

	// ESC key handler
	document.addEventListener('keydown', function(e) {
		if (e.key === 'Escape') {
			toggleMenu();
		}
	});

	// Menu button handlers
	document.getElementById('menu-save-btn').addEventListener('click', saveGame);
	document.getElementById('menu-resume-btn').addEventListener('click', closeMenu);

	// Click outside menu to close
	document.getElementById('menu-overlay').addEventListener('click', function(e) {
		if (e.target === this) {
			closeMenu();
		}
	});

	// The simulation starts only after Play is pressed.
</script>
